<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fusion — Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-body:     #0a0a0b;
  --bg-navbar:   rgba(18,18,20,0.95);
  --bg-card:     #18181b;
  --bg-card-hover:#27272a;
  --border-color:#27272a;
  --text-primary:#ffffff;
  --text-secondary:#a1a1aa;
  --status-ok:   #10b981;
  --status-danger:#ef4444;
  --blue:        #3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg-body);color:var(--text-primary);min-height:100vh;-webkit-text-size-adjust:100%;}

/* ── TOPBAR ── */
.topbar{
  background:var(--bg-navbar);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-color);
  padding:0 1.5rem;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:1000;
}
.topbar img{height:32px;object-fit:contain;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.topbar-label{
  font-size:15px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--text-primary);
  border-left:1px solid var(--border-color);
  padding-left:16px;margin-left:6px;
}
#upd{font-size:11px;color:#52525b;}
@media(max-width:768px){
  .topbar{padding:0 1rem;height:56px;}
  .topbar img{height:26px;}
  .topbar-label{font-size:12px;padding-left:12px;margin-left:4px;}
  .topbar-right{gap:8px;}
}

/* ── CONTAINER ── */
.container{padding:1rem;max-width:1600px;margin:0 auto;width:100%;}

/* ── FILTROS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center;}
.filter-pill{
  background:var(--bg-card);border:1px solid var(--border-color);
  border-radius:8px;padding:8px 12px;
  display:flex;align-items:center;gap:6px;font-size:12px;
  transition:border-color 0.2s;flex:1;min-width:140px;
}
.filter-pill:focus-within{border-color:var(--blue);}
.filter-pill label{color:var(--text-secondary);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;}
.filter-pill select,.filter-pill input{
  border:none;outline:none;font-size:12px;font-family:inherit;
  color:var(--text-primary);background:transparent;width:100%;
}
.filter-pill select option{background:var(--bg-card);}
.filter-row2{display:flex;gap:8px;margin-bottom:1.25rem;}
.ftoggle{
  flex:1;background:var(--bg-card);border:1px solid var(--border-color);
  border-radius:8px;padding:9px 12px;font-size:12px;
  color:var(--text-secondary);cursor:pointer;transition:all 0.2s;
  text-align:center;
}
.ftoggle:active{opacity:0.8;}
.ftoggle.on{background:var(--blue);color:#fff;border-color:var(--blue);}

/* ── KPIs ── */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;margin-bottom:1.25rem;
}
.kpi-card{
  background:var(--bg-card);border:1px solid var(--border-color);
  border-radius:12px;padding:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.2);
}
.kpi-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.kpi-title{color:var(--text-secondary);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;line-height:1.3;}
.kpi-value{font-size:1.6rem;font-weight:700;color:var(--text-primary);line-height:1;}
.kpi-change{font-size:11px;margin-top:4px;color:var(--text-secondary);}
.change-positive{color:var(--status-ok);}
.change-negative{color:var(--status-danger);}

/* ── PRODUTO BLOCK ── */
.prod-block{
  background:var(--bg-card);border:1px solid var(--border-color);
  border-radius:12px;margin-bottom:8px;overflow:hidden;
}
.prod-head{
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;padding:14px;cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.prod-head:active{background:var(--bg-card-hover);}
.prod-nome{font-size:13px;font-weight:600;color:#fff;flex:1;line-height:1.3;}
.prod-cat{
  font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
  color:#71717a;background:rgba(255,255,255,0.06);
  padding:3px 7px;border-radius:4px;white-space:nowrap;
}
.prod-tot{font-size:15px;font-weight:700;color:var(--blue);white-space:nowrap;}
.arrow{font-size:9px;color:#52525b;transition:transform 0.2s;}
.arrow.open{transform:rotate(90deg);color:var(--blue);}

/* ── CORPO ── */
.prod-body{display:none;border-top:1px solid var(--border-color);}
.prod-body.open{display:block;}

/* ── VIEW MOBILE: cards por cor ── */
.mb-cor-row{border-bottom:1px solid var(--border-color);}
.mb-cor-row:last-child{border-bottom:none;}
.mb-cor-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:rgba(255,255,255,0.02);
}
.mb-cor-nome{font-size:13px;font-weight:500;color:#e4e4e7;}
.mb-cor-tot{font-size:13px;font-weight:700;color:var(--blue);}
.mb-tams{
  display:flex;flex-wrap:wrap;gap:6px;
  padding:8px 14px 12px;
}
.mb-tam{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border-color);
  border-radius:6px;padding:4px 8px;
}
.mb-tam-label{font-size:10px;color:var(--text-secondary);font-weight:600;}
.mb-tam-val{font-size:13px;font-weight:700;color:#e4e4e7;}

/* ── VIEW DESKTOP: tabela ── */
.mwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.mtz{width:100%;border-collapse:collapse;font-size:12px;}
table.mtz th{
  background:rgba(255,255,255,0.02);color:var(--text-secondary);
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:0.06em;padding:10px 12px;
  border-bottom:1px solid var(--border-color);
  white-space:nowrap;text-align:center;
}
table.mtz th.thc{text-align:left;min-width:110px;position:sticky;left:0;background:#18181b;z-index:2;}
table.mtz td{padding:9px 12px;border-bottom:1px solid var(--border-color);text-align:center;color:#d4d4d8;}
table.mtz td.tdc{
  text-align:left;white-space:nowrap;font-weight:500;color:#f4f4f5;
  position:sticky;left:0;background:#18181b;z-index:1;
  display:flex;align-items:center;gap:8px;
}
table.mtz td.zero{color:#3f3f46;}
table.mtz td.tot{font-weight:700;background:rgba(255,255,255,0.03)!important;border-left:1px solid var(--border-color);color:#f4f4f5;}
table.mtz tr:hover td{background:rgba(255,255,255,0.03);}
table.mtz tr:hover td.tdc{background:#1f1f23;}
table.mtz tfoot td{background:rgba(255,255,255,0.04)!important;font-weight:700;font-size:11px;color:#fff;border-top:1px solid #3f3f46;}
table.mtz tfoot td.tdc{background:rgba(255,255,255,0.04)!important;}
.cor-dot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);flex-shrink:0;}

/* ── CANAL ── */
.canal-btn{
  display:flex;align-items:center;gap:8px;padding:11px 14px;
  cursor:pointer;background:rgba(255,255,255,0.02);
  border-top:1px solid var(--border-color);
  -webkit-tap-highlight-color:transparent;
}
.canal-btn-ico{font-size:9px;color:#71717a;transition:transform 0.2s;}
.canal-btn-ico.open{transform:rotate(90deg);color:var(--blue);}
.canal-btn-txt{font-size:11px;font-weight:500;color:#a1a1aa;}
.canal-body{display:none;}
.canal-body.open{display:block;}
.canal-bloco{border-top:1px solid var(--border-color);}
.canal-head2{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:rgba(255,255,255,0.02);
  border-bottom:1px solid var(--border-color);
}
.tag-canal{
  display:inline-flex;align-items:center;
  padding:4px 10px;border-radius:6px;
  font-size:11px;font-weight:600;letter-spacing:0.03em;
}
.canal-units{
  font-size:12px;font-weight:600;color:#a1a1aa;
  background:rgba(255,255,255,0.05);
  padding:3px 10px;border-radius:6px;
  border:1px solid var(--border-color);
}

/* ── LOADING ── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text-secondary);}
.spin{width:24px;height:24px;border:2px solid var(--border-color);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:30px;color:var(--text-secondary);font-size:13px;}

/* ── DESKTOP ── */
@media(min-width:769px){
  .container{padding:2rem;}
  .kpi-grid{grid-template-columns:repeat(5,1fr);gap:1.25rem;margin-bottom:2rem;}
  .kpi-card{padding:1.5rem;border-radius:16px;}
  .kpi-value{font-size:2rem;}
  .kpi-title{font-size:0.8rem;}
  .filters{gap:12px;margin-bottom:1.5rem;flex-wrap:nowrap;}
  .filter-pill{flex:none;min-width:auto;}
  .filter-row2{display:none;}
  .ftoggle-desktop{display:flex;gap:12px;}
  .prod-head{padding:14px 20px;}
  .prod-nome{font-size:14px;}
  .prod-block{border-radius:16px;margin-bottom:10px;}
  .canal-btn,.canal-head2{padding:11px 20px;}
  .mb-cor-head,.mb-tams{padding-left:20px;padding-right:20px;}
}

/* Safari/iOS safe area */
@supports(padding:max(0px)){
  .topbar{padding-top:max(0px,env(safe-area-inset-top));}
  .container{padding-bottom:max(1rem,env(safe-area-inset-bottom));}
}
.btn-back, .btn-logout-tb{
  background:transparent;border:1px solid var(--border-color);color:var(--text-secondary);
  padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;
  font-family:inherit;text-decoration:none;display:inline-block;
}
.btn-back:hover{border-color:var(--blue);color:var(--blue);}
.btn-logout-tb:hover{border-color:var(--status-danger);color:var(--status-danger);}
#user-info-tb{font-size:13px;color:var(--text-secondary);}
@media(max-width:768px){
  .btn-back, .btn-logout-tb{padding:5px 10px;font-size:11px;}
  #user-info-tb{display:none;}
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
</head>
<body>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:14px;">
    <img src="/logo-urso.png" alt="Fusion">
    <span class="topbar-label">Estoque</span>
  </div>
  <div class="topbar-right">
    <span id="upd"></span>
    <span id="user-info-tb"></span>
    <a href="/index.html" class="btn-back">Menu</a>
    <button class="btn-logout-tb" onclick="fusionAuth.signOut()">Sair</button>
  </div>
</header>

<div class="container">
  <!-- Filtros desktop -->
  <div class="filters">
    <div class="filter-pill">
      <label>Buscar</label>
      <input type="text" id="busca" placeholder="produto ou SKU..." autocomplete="off" autocorrect="off">
    </div>
    <div class="filter-pill">
      <label>Categoria</label>
      <select id="sel-cat"><option value="">Todas</option></select>
    </div>
    <!-- Botões apenas visíveis no desktop -->
    <button class="ftoggle on" id="btn-zeros" onclick="toggleZeros()">Mostrar sem estoque</button>
    <button class="ftoggle" id="btn-exp" onclick="toggleExpandAll()">Expandir todos</button>
  </div>

  <!-- Botões mobile em linha separada -->
  <div class="filter-row2">
    <button class="ftoggle on" id="btn-zeros-m" onclick="toggleZeros()">Mostrar sem estoque</button>
    <button class="ftoggle" id="btn-exp-m" onclick="toggleExpandAll()">Expandir todos</button>
  </div>

  <div class="kpi-grid" id="kpis">
    <div class="kpi-card"><div class="kpi-title">Carregando...</div><div class="kpi-value">—</div></div>
  </div>

  <div id="app"><div class="loading"><div class="spin"></div><span>Carregando dados...</span></div></div>
</div>

<script>



const SB_URL='https://spulbhnmkomvgohzhfvj.supabase.co';
let AUTH_HEADERS = null; // preenchido após requireAuth

// Canais com ícones e cores distintas
const LOCS=[
  {key:'olist_fio',    label:'Olist Fio',      cor:'#3b82f6'},
  {key:'olist_kwid',   label:'KWID CD',         cor:'#10b981'},
  {key:'mlfull_fio',   label:'ML Full Fio',     cor:'#f59e0b'},
  {key:'mlfull_confec',label:'ML Full Confec',  cor:'#8b5cf6'},
  {key:'shopee',       label:'Shopee',          cor:'#ef4444'},
  {key:'shopify',      label:'Shopify',         cor:'#06b6d4'},
];




const ORDEM_TAM=['PP','P','M','G','G1','GG','GG1','XG','XGG','EG','EGG','36','38','40','42','44','46','48','50','52','54','56','Único','UN'];

const COR_MAP={
  'PRETO':'#111','BRANCO':'#F5F5F5','CINZA':'#888','CINZA ESCURO':'#444',
  'CINZA MESCLA':'#999','CINZA GRAFITE':'#555','AZUL':'#1E3A6E',
  'AZUL MARINHO':'#0F2347','AZUL BEBE':'#5B8EC4','AZUL JEANS':'#3A5F8A',
  'VERMELHO':'#8B1A1A','VINHO':'#5C1A2A','VERDE':'#1A5C2A',
  'VERDE MILITAR':'#3A4A20','BEGE':'#C8B090','CARAMELO':'#B07040',
  'MARROM':'#6A3A20','AREIA':'#C8B888','NUDE':'#D4A080','CREME':'#EDE0CC',
  'ROSA':'#C87090','AMARELO':'#C8A020','LARANJA':'#C86020','ROXO':'#6A3A8A',
  'MADAGASCAR':'#8A6A4A','RISCA DE GIZ':'#D0D0CC','CHUMBO':'#555',
  'OFF WHITE':'#F0EEE8',
};

function corV(n){
  if(!n) return '#CCC';
  const u=n.toUpperCase().trim();
  for(const[k,v] of Object.entries(COR_MAP)) if(u.includes(k)) return v;
  return '#CCC';
}
function fmt(n){return Math.round(n||0).toLocaleString('pt-BR');}

async function api(path){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{headers:AUTH_HEADERS});
  if(!r.ok) throw new Error(`${r.status}`);
  return r.json();
}
async function apiAll(base){
  let all=[],o=0;
  while(true){
    const r=await api(`${base}&limit=1000&offset=${o}`);
    if(!Array.isArray(r)||!r.length) break;
    all=all.concat(r);
    if(r.length<1000) break;
    o+=1000;
  }
  return all;
}

let DADOS=null, EXP={}, CANAL={}, filtroZ=true, expAll=false;

async function carregar(){
  try{
    const[prods,est]=await Promise.all([
      apiAll('produtos?select=id,sku,descricao,nome,categoria,tipo,sku_pai,cor,tamanho'),
      apiAll('estoque?select=produto_id,sku,quantidade,localizacao'),
    ]);

    // Índices de estoque
    const eById={};
    est.forEach(e=>{
      if(!e.produto_id) return;
      if(!eById[e.produto_id]) eById[e.produto_id]={};
      eById[e.produto_id][e.localizacao]=(eById[e.produto_id][e.localizacao]||0)+(e.quantidade||0);
    });
    const eBySku={};
    est.forEach(e=>{
      if(!e.sku) return;
      const k=e.sku.trim().toUpperCase();
      if(!eBySku[k]) eBySku[k]={};
      eBySku[k][e.localizacao]=(eBySku[k][e.localizacao]||0)+(e.quantidade||0);
    });

    // Mapas de pai
    const pBySku={};
    prods.filter(p=>p.tipo==='pai').forEach(p=>{
      pBySku[p.sku.trim().toUpperCase()]={
        id:p.id, sku:p.sku,
        nome:p.descricao||p.nome||p.sku,
        categoria:p.categoria||'',
        cores:{},
      };
    });

    // Distribui filhos
    prods.filter(p=>p.tipo==='filho').forEach(p=>{
      let pai=null;

      // 1) pelo sku_pai direto
      if(p.sku_pai) pai=pBySku[p.sku_pai.trim().toUpperCase()];

      // 2) extrai do sku removendo último segmento após hífen
      if(!pai&&p.sku){
        const parts=p.sku.trim().toUpperCase().split('-');
        if(parts.length>1) pai=pBySku[parts.slice(0,-1).join('-')];
      }

      if(!pai) return;

      const rawCor = (p.cor||'').replace(/[¨"'`]/g,'').trim();
      const cor = rawCor || 'Sem cor';
      const tam=(p.tamanho||'Único').trim();
      if(!pai.cores[cor]) pai.cores[cor]={};
      if(!pai.cores[cor][tam]) pai.cores[cor][tam]={};

      // SKU como fonte primária — produto_id no estoque aponta para o pai, não o filho
      const e=eBySku[p.sku?.trim().toUpperCase()]||eById[p.id]||{};
      LOCS.forEach(loc=>{
        pai.cores[cor][tam][loc.key]=(pai.cores[cor][tam][loc.key]||0)+(e[loc.key]||0);
      });
    });

    const pais=Object.values(pBySku).filter(p=>Object.keys(p.cores).length>0);

    // Categorias
    const cats=[...new Set(pais.map(p=>p.categoria).filter(Boolean))].sort();
    const sel=document.getElementById('sel-cat');
    cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});

    DADOS={pais};
    document.getElementById('upd').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR');
    render();
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="loading" style="color:var(--danger)">Erro: ${e.message}</div>`;
  }
}

function totPai(p){
  let t=0;
  Object.values(p.cores).forEach(ts=>Object.values(ts).forEach(ls=>LOCS.forEach(l=>{t+=ls[l.key]||0;})));
  return t;
}

function toggleZeros(){
  filtroZ=!filtroZ;
  const txt=filtroZ?'Mostrar sem estoque':'Ocultar sem estoque';
  ['btn-zeros','btn-zeros-m'].forEach(id=>{
    const b=document.getElementById(id);
    if(!b) return;
    b.classList.toggle('on',filtroZ);
    b.textContent=txt;
  });
  render();
}

function toggleExpandAll(){
  expAll=!expAll;
  const b=document.getElementById('btn-exp');
  b.classList.toggle('on',expAll);
  b.textContent=expAll?'Recolher todos':'Expandir todos';
  if(DADOS) DADOS.pais.forEach(p=>{EXP[safe(p.sku)]=expAll;});
  render();
}

function safe(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}

function toggleProd(id){
  EXP[id]=!EXP[id];
  document.getElementById('body-'+id)?.classList.toggle('open',EXP[id]);
  document.getElementById('arrow-'+id)?.classList.toggle('open',EXP[id]);
}

function toggleCanal(id){
  CANAL[id]=!CANAL[id];
  document.getElementById('cbody-'+id)?.classList.toggle('open',CANAL[id]);
  const arr=document.getElementById('carrow-'+id);
  if(arr) arr.classList.toggle('open',CANAL[id]);
}

function render(){
  if(!DADOS) return;
  const busca=document.getElementById('busca').value.trim().toLowerCase();
  const cat=document.getElementById('sel-cat').value;

  let pais=DADOS.pais.filter(p=>{
    if(cat&&p.categoria!==cat) return false;
    if(busca&&!p.sku.toLowerCase().includes(busca)&&!p.nome.toLowerCase().includes(busca)) return false;
    if(filtroZ&&totPai(p)===0) return false;
    return true;
  }).sort((a,b)=>a.categoria.localeCompare(b.categoria)||a.nome.localeCompare(b.nome));

  // KPIs
  let tg=0,sem=0,com=0; const tl={};
  DADOS.pais.forEach(p=>{
    const t=totPai(p); tg+=t;
    if(t===0)sem++;else com++;
    Object.values(p.cores).forEach(ts=>Object.values(ts).forEach(ls=>
      LOCS.forEach(l=>{tl[l.key]=(tl[l.key]||0)+(ls[l.key]||0);})
    ));
  });

  const maiorLoc=LOCS.find(l=>tl[l.key]===Math.max(...Object.values(tl),0));
  document.getElementById('kpis').innerHTML=`
    <div class="kpi-card">
      <div class="kpi-header"><span class="kpi-title">Total em Estoque</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
      </div>
      <div class="kpi-value">${fmt(tg)}</div>
      <div class="kpi-change" style="color:var(--text-secondary)">todas as plataformas</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-header"><span class="kpi-title">Com Estoque</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <div class="kpi-value" style="color:#10b981">${fmt(com)}</div>
      <div class="kpi-change change-positive">produtos ativos</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-header"><span class="kpi-title">Sem Estoque</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${sem>0?'#ef4444':'#10b981'}" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
      </div>
      <div class="kpi-value" style="color:${sem>0?'#ef4444':'#10b981'}">${fmt(sem)}</div>
      <div class="kpi-change ${sem>0?'change-negative':'change-positive'}">produtos zerados</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-header"><span class="kpi-title">Exibindo</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
      <div class="kpi-value">${fmt(pais.length)}</div>
      <div class="kpi-change" style="color:var(--text-secondary)">de ${fmt(DADOS.pais.length)} produtos</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-header"><span class="kpi-title">Maior Estoque</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
      </div>
      <div class="kpi-value" style="color:#3b82f6">${fmt(Math.max(...Object.values(tl),0))}</div>
      <div class="kpi-change" style="color:var(--text-secondary)">${maiorLoc?maiorLoc.label:'—'}</div>
    </div>
  `;

  document.getElementById('app').innerHTML=pais.length===0
    ?'<div class="empty">Nenhum produto encontrado</div>'
    :pais.map(p=>renderProd(p)).join('');
}

function renderProd(pai){
  const id=safe(pai.sku);
  const tot=totPai(pai);
  const isOpen=!!EXP[id];

  // Tamanhos ordenados
  const tamSet=new Set();
  Object.values(pai.cores).forEach(ts=>Object.keys(ts).forEach(t=>tamSet.add(t)));
  const tams=[...tamSet].sort((a,b)=>{
    const ia=ORDEM_TAM.indexOf(a),ib=ORDEM_TAM.indexOf(b);
    if(ia>=0&&ib>=0) return ia-ib;
    if(ia>=0) return -1; if(ib>=0) return 1;
    return a.localeCompare(b);
  });

  const cors=Object.keys(pai.cores).sort();

  // Totais consolidados
  const tTam={};
  cors.forEach(c=>tams.forEach(t=>{
    const v=LOCS.reduce((s,l)=>s+((pai.cores[c][t]||{})[l.key]||0),0);
    tTam[t]=(tTam[t]||0)+v;
  }));
  const tCor={};
  cors.forEach(c=>{ tCor[c]=tams.reduce((s,t)=>s+LOCS.reduce((s2,l)=>s2+((pai.cores[c][t]||{})[l.key]||0),0),0); });
  const tLoc={};
  LOCS.forEach(l=>{
    let v=0; cors.forEach(c=>tams.forEach(t=>{v+=((pai.cores[c][t]||{})[l.key]||0);}));
    tLoc[l.key]=v;
  });

  const thTams=tams.map(t=>`<th>${t}</th>`).join('');

  // Linhas consolidadas
  const linhas=cors.map(c=>{
    const cells=tams.map(t=>{
      const v=LOCS.reduce((s,l)=>s+((pai.cores[c][t]||{})[l.key]||0),0);
      return `<td class="${v===0?'zero':''}">${v===0?'—':fmt(v)}</td>`;
    }).join('');
    return `<tr><td class="tdc"><div class="cor-dot" style="background:${corV(c)}"></div>${c}</td>${cells}<td class="tot">${tCor[c]>0?fmt(tCor[c]):'—'}</td></tr>`;
  }).join('');

  const totCols=tams.map(t=>`<td class="tot">${fmt(tTam[t])}</td>`).join('');

  // Painel de canais — estilo Antigravity
  const canaisHtml=LOCS.map((l,i)=>{
    const v=tLoc[l.key];
    if(!v) return '';
    function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `${r},${g},${b}`;}
    const rgb=hexToRgb(l.cor);
    const lins=cors.map(c=>{
      const cells=tams.map(t=>{
        const q=(pai.cores[c][t]||{})[l.key]||0;
        return `<td class="${q===0?'zero':''}">${q===0?'—':fmt(q)}</td>`;
      }).join('');
      const rt=tams.reduce((s,t)=>s+((pai.cores[c][t]||{})[l.key]||0),0);
      return `<tr><td class="tdc"><div class="cor-dot" style="background:${corV(c)}"></div>${c}</td>${cells}<td class="tot">${rt>0?fmt(rt):'—'}</td></tr>`;
    }).join('');
    return `<div class="canal-bloco">
      <div class="canal-head2">
        <span class="tag-canal" style="background:rgba(${rgb},0.15);color:${l.cor};border:1px solid rgba(${rgb},0.3);">
          <span style="width:7px;height:7px;border-radius:50%;background:${l.cor};display:inline-block;margin-right:6px;"></span>
          ${l.label}
        </span>
        <span class="canal-units">${fmt(v)} unidades</span>
      </div>
      <div class="mwrap">
        <table class="mtz">
          <thead><tr><th class="thc">Cor</th>${thTams}<th>Total</th></tr></thead>
          <tbody>${lins}</tbody>
        </table>
      </div>
    </div>`;
  }).filter(Boolean).join('');

  // VIEW MOBILE — cards por cor
  const isMobile = window.innerWidth <= 768;
  if(isMobile){
    const coresTotais = cors.map(cor=>{
      const tot = LOCS.reduce((s,l)=>s+tams.reduce((s2,t)=>s2+((pai.cores[cor][t]||{})[l.key]||0),s2),0);
      const tamCells = tams.map(t=>{
        const v = LOCS.reduce((s,l)=>s+((pai.cores[cor][t]||{})[l.key]||0),0);
        return v>0?`<div class="mb-tam"><span class="mb-tam-label">${t}</span><span class="mb-tam-val">${fmt(v)}</span></div>`:'';
      }).filter(Boolean).join('');
      if(!tamCells) return '';
      return `<div class="mb-cor-row">
        <div class="mb-cor-head">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="cor-dot" style="background:${corV(cor)}"></div>
            <span class="mb-cor-nome">${cor}</span>
          </div>
          <span class="mb-cor-tot">${fmt(tot)}</span>
        </div>
        <div class="mb-tams">${tamCells}</div>
      </div>`;
    }).filter(Boolean).join('');

    return `<div class="prod-block">
      <div class="prod-head" onclick="toggleProd('${id}')">
        <span class="prod-nome">${pai.nome}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="prod-cat">${pai.categoria||'—'}</span>
          <span class="prod-tot">${fmt(tot)}</span>
          <span class="arrow ${isOpen?'open':''}" id="arrow-${id}">▶</span>
        </div>
      </div>
      <div class="prod-body ${isOpen?'open':''}" id="body-${id}">
        ${coresTotais||'<div class="empty" style="padding:20px">Sem estoque</div>'}
        ${canaisHtml?`
          <div class="canal-btn" onclick="toggleCanal('${id}')">
            <span class="canal-btn-ico ${CANAL[id]?'open':''}" id="carrow-${id}">▶</span>
            <span class="canal-btn-txt">Ver por canal</span>
          </div>
          <div class="canal-body ${CANAL[id]?'open':''}" id="cbody-${id}">${canaisHtml}</div>
        `:''}
      </div>
    </div>`;
  }

  return `
    <div class="prod-block">
      <div class="prod-head" onclick="toggleProd('${id}')">
        <span class="prod-nome">${pai.nome}</span>
        <span class="prod-cat">${pai.categoria||'—'}</span>
        <span class="prod-tot-lbl">Total</span>
        <span class="prod-tot">${fmt(tot)}</span>
        <span class="arrow ${isOpen?'open':''}" id="arrow-${id}">▶</span>
      </div>
      <div class="prod-body ${isOpen?'open':''}" id="body-${id}">
        <div class="mwrap">
          <table class="mtz">
            <thead><tr><th class="thc">Cor</th>${thTams}<th>Total</th></tr></thead>
            <tbody>${linhas}</tbody>
            <tfoot><tr><td class="tdc" style="font-weight:600">Total</td>${totCols}<td class="tot">${fmt(tot)}</td></tr></tfoot>
          </table>
        </div>
        ${canaisHtml?`
          <div class="canal-toggle" onclick="toggleCanal('${id}')">
            <span class="canal-toggle-arrow ${CANAL[id]?'open':''}" id="carrow-${id}">▶</span>
            <span class="canal-toggle-txt">Ver por canal de estoque</span>
          </div>
          <div class="canal-body ${CANAL[id]?'open':''}" id="cbody-${id}">${canaisHtml}</div>
        `:''}
      </div>
    </div>`;
}

['busca','sel-cat'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
  document.getElementById(id).addEventListener('change',render);
});

(async () => {
  const auth = await fusionAuth.requireAuth('estoque');
  if (!auth) return;
  AUTH_HEADERS = auth.headers;
  const ui = document.getElementById('user-info-tb');
  if (ui) ui.textContent = (auth.role.nome || auth.role.email);
  carregar().catch(e=>{
    document.getElementById('app').innerHTML=`<div class="loading" style="color:var(--danger)">Erro: ${e.message}</div>`;
  });
})();






// Atualiza botões desktop quando resize
window.addEventListener('resize', ()=>{ if(DADOS) render(); });
</script>
