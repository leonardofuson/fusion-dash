<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fusion OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-body:     #0a0a0b;
  --bg-card:     #18181b;
  --bg-card-hover:#27272a;
  --border:      #27272a;
  --text:        #ffffff;
  --text-soft:   #a1a1aa;
  --accent:      #3b82f6;
  --accent-hover:#2563eb;
  --danger:      #ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{
  background:var(--bg-body);color:var(--text);
  min-height:100vh;display:flex;flex-direction:column;
}

/* TOPBAR */
.topbar{
  background:rgba(18,18,20,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 1.5rem;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.topbar .brand{display:flex;align-items:center;gap:11px;font-size:17px;}
.topbar .brand img{height:32px;width:auto;}
.topbar .brand .wm{font-weight:700;letter-spacing:-.01em;color:var(--text);}
.topbar .brand .os-suf{margin-left:6px;}
.os-suf{font-weight:800;background:linear-gradient(120deg,#7c9dff,#c4a3ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
.topbar-right{display:flex;align-items:center;gap:14px;font-size:14px;color:var(--text-soft);}
.btn-logout{
  background:transparent;border:1px solid var(--border);color:var(--text-soft);
  padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;
  font-family:inherit;
}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
@media(max-width:768px){
  .topbar{padding:0 1rem;height:56px;}
  .topbar .brand{font-size:13px;gap:10px;}
  .topbar .brand img{height:26px;}
  .topbar-right{gap:8px;font-size:12px;}
  #user-info{display:none;}
  .btn-logout{padding:5px 10px;font-size:11px;}
}

/* CENTRAL */
.center{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;
}

/* LOGIN CARD */
.login-card{
  width:100%;max-width:380px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:12px;padding:2rem;
}
.login-card .logo-wrap{
  display:flex;justify-content:center;margin-bottom:1.5rem;
}
.login-card .logo-wrap img{
  height:64px;width:auto;
}
.login-card h1{
  font-size:18px;font-weight:600;margin-bottom:.4rem;text-align:center;
}
.login-card .subtitle{
  font-size:13px;color:var(--text-soft);margin-bottom:1.5rem;text-align:center;
}
.field{margin-bottom:1rem;}
.field label{
  display:block;font-size:11px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;color:var(--text-soft);margin-bottom:.4rem;
}
.field input{
  width:100%;background:var(--bg-body);border:1px solid var(--border);
  color:var(--text);padding:.7rem .9rem;border-radius:8px;
  font-size:14px;font-family:inherit;
}
.field input:focus{outline:none;border-color:var(--accent);}
.btn-primary{
  width:100%;background:var(--accent);border:none;color:#fff;
  padding:.8rem;border-radius:8px;font-size:14px;font-weight:600;
  cursor:pointer;font-family:inherit;margin-top:.5rem;
}
.btn-primary:hover{background:var(--accent-hover);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.error-msg{
  color:var(--danger);font-size:12px;margin-top:.8rem;text-align:center;
  min-height:1em;
}

/* MENU — categorias + cards com letra cropada e fade na cor */
.menu-wrap{width:100%;max-width:1160px;}
.menu-header{margin-bottom:.5rem;}
.menu-header h1{font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:.3rem;}
.menu-header p{font-size:13px;color:var(--text-soft);}
.cat{margin-top:24px;}
.cat-h{display:flex;align-items:center;gap:10px;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--cc);margin-bottom:13px;}
.cat-h::before{content:'';width:9px;height:9px;border-radius:50%;background:var(--cc);box-shadow:0 0 12px var(--cc);}
.cat-h::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,color-mix(in srgb,var(--cc) 35%,transparent),transparent);}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:15px;}
.menu-card{position:relative;overflow:hidden;display:block;text-decoration:none;color:inherit;cursor:pointer;background:#111114;border:1px solid #26262d;border-radius:16px;min-height:126px;transition:transform .2s, border-color .2s;}
.menu-card:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--accent) 60%,#26262d);}
.mc-sweep{position:absolute;inset:0;z-index:0;background:linear-gradient(105deg,color-mix(in srgb,var(--accent) 72%,#0c0c10) 0%,color-mix(in srgb,var(--accent) 30%,#0c0c10) 42%,#101014 100%);}
.mc-mono{position:absolute;z-index:1;left:8px;top:50%;transform:translateY(-50%);font-size:240px;font-weight:800;line-height:.72;letter-spacing:-.05em;
  background:linear-gradient(160deg,color-mix(in srgb,var(--accent) 22%,#fff),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;-webkit-text-stroke:1.3px color-mix(in srgb,var(--accent) 35%,#fff);}
.mc-body{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;z-index:2;text-align:right;padding:22px 27px 22px 37%;}
.mc-t{font-weight:800;letter-spacing:-.02em;margin-bottom:6px;font-size:19px;color:#fff;}
.mc-d{line-height:1.42;font-size:12.5px;font-weight:600;color:#eceef4;}
@media(max-width:768px){.cat-grid{grid-template-columns:1fr;}.mc-body{padding-left:42%;}}

.hidden{display:none!important;}
.loading-msg{text-align:center;color:var(--text-soft);font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><img src="/logo-urso.png" alt="Fusion"><span class="wm">Fusion<span class="os-suf">OS</span></span></div>
  <div class="topbar-right">
    <span id="user-info"></span>
    <button id="btn-logout" class="btn-logout hidden" onclick="fusionAuth.signOut()">Sair</button>
  </div>
</div>

<div class="center">
  <!-- TELA DE LOGIN -->
  <div id="login-view" class="login-card hidden">
    <div class="logo-wrap"><img src="/logo-marca.png" alt="Fusion"></div>
    <h1>Fusion <span class="os-suf">OS</span></h1>
    <p class="subtitle">Entre com seu e-mail corporativo.</p>
    <form id="login-form">
      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" required autocomplete="email" autofocus>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="btn-login">Entrar</button>
      <div class="error-msg" id="login-error"></div>
    </form>
  </div>

  <!-- MENU PÓS-LOGIN -->
  <div id="menu-view" class="menu-wrap hidden">
    <div class="menu-header">
      <h1 id="menu-greeting">Olá</h1>
      <p>Selecione um dashboard para acessar.</p>
    </div>
    <div id="menu-grid"></div>
  </div>

  <!-- LOADING -->
  <div id="loading-view" class="loading-msg">Carregando...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
<script>
const $ = (id) => document.getElementById(id);

function show(view) {
  ['login-view', 'menu-view', 'loading-view'].forEach(v => $(v).classList.add('hidden'));
  $(view).classList.remove('hidden');
}

async function init() {
  show('loading-view');
  const session = await fusionAuth.getSession();
  if (!session) {
    $('user-info').textContent = '';
    $('btn-logout').classList.add('hidden');
    show('login-view');
    return;
  }
  const role = await fusionAuth.getUserRole(session);
  if (!role || !role.ativo) {
    alert('Usuário sem permissões cadastradas. Contate o administrador.');
    await fusionAuth.signOut();
    return;
  }
  // Header
  $('user-info').textContent = role.nome || role.email;
  $('btn-logout').classList.remove('hidden');
  // Greeting
  const primeiroNome = (role.nome || role.email.split('@')[0]).split(' ')[0];
  $('menu-greeting').textContent = `Olá, ${primeiroNome}`;
  // Cards agrupados por categoria — só os dashes que o usuário tem E passam no restritoPara.
  const grid = $('menu-grid');
  const CAT_META = [
    { key: 'vendas',       label: 'Vendas',       color: '#2563eb' },
    { key: 'operacoes',    label: 'Operações',    color: '#059669' },
    { key: 'inteligencia', label: 'Inteligência', color: '#7c3aed' },
    { key: 'assistente',   label: 'Assistente',   color: '#52525b' },
  ];
  const email = (role.email || '').toLowerCase();
  const allowed = new Set(role.dashes || []);
  const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  const inicial = (s) => (String(s || '?').trim()[0] || '?').toUpperCase();
  let html = '';
  CAT_META.forEach(cat => {
    const keys = Object.keys(fusionAuth.DASHES).filter(k => {
      const m = fusionAuth.DASHES[k];
      if (!m || m.cat !== cat.key || !allowed.has(k)) return false;
      if (m.restritoPara && !m.restritoPara.includes(email)) return false;
      return true;
    });
    if (!keys.length) return;
    html += '<div class="cat" style="--cc:' + cat.color + '"><div class="cat-h">' + cat.label + '</div><div class="cat-grid">';
    keys.forEach(k => {
      const m = fusionAuth.DASHES[k];
      const ext = /^https?:/i.test(m.url) ? ' target="_blank" rel="noopener"' : '';
      html += '<a class="menu-card" style="--accent:' + cat.color + '" href="' + esc(m.url) + '"' + ext + '>' +
        '<span class="mc-sweep"></span><span class="mc-mono">' + inicial(m.titulo) + '</span>' +
        '<div class="mc-body"><div class="mc-t">' + esc(m.titulo) + '</div><div class="mc-d">' + esc(m.descricao) + '</div></div></a>';
    });
    html += '</div></div>';
  });
  grid.innerHTML = html || '<p class="loading-msg">Você ainda não tem nenhum dashboard liberado.</p>';
  show('menu-view');
}

$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = $('btn-login');
  const errBox = $('login-error');
  errBox.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  try {
    await fusionAuth.signInWithPassword($('email').value.trim(), $('password').value);
    await init();
  } catch (err) {
    errBox.textContent = err.message === 'Invalid login credentials'
      ? 'E-mail ou senha incorretos.'
      : (err.message || 'Erro ao entrar.');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});

init();
</script>
</body>
</html>
