<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fusion — Vendas Lojas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0a0a0b;--bg2:#18181b;--bg3:#27272a;--bdr:#27272a;--txt1:#ffffff;--txt2:#a1a1aa;--txt3:#52525b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--txt1);min-height:100vh;}
.topbar{background:rgba(18,18,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);height:52px;display:flex;align-items:center;padding:0 1.5rem;gap:16px;position:sticky;top:0;z-index:100;}
.topbar img{height:22px;}
.topbar-div{width:1px;height:18px;background:var(--bdr);}
.topbar-label{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt2);}
.nav{display:flex;gap:4px;margin-left:auto;}
.nav a{font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;text-decoration:none;color:var(--txt2);transition:all 0.15s;}
.nav a:hover{background:var(--bg3);color:var(--txt1);}
.nav a.ativo{background:var(--green);color:#fff;}
.main{max-width:1400px;margin:0 auto;padding:1.5rem;}
.filtros{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--bg2);color:var(--txt2);cursor:pointer;transition:all 0.15s;}
.chip:hover{border-color:var(--green);color:var(--green);}
.chip.on{background:var(--green);border-color:var(--green);color:#fff;}
.drange{display:flex;gap:8px;align-items:center;}
.dinput{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--txt1);font-family:inherit;outline:none;}
.btnf{background:var(--green);border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:1.5rem;}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:transform 0.2s;}
.kpi:hover{transform:translateY(-2px);}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--txt2);margin-bottom:8px;}
.kpi-val{font-size:1.6rem;font-weight:700;color:var(--txt1);line-height:1;}
.kpi-sub{font-size:11px;color:var(--txt3);margin-top:5px;}
.kv-blue{color:var(--blue)!important;} .kv-green{color:var(--green)!important;} .kv-red{color:var(--red)!important;} .kv-amber{color:var(--amber)!important;}
.lojas-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.loja-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:16px;border-left:3px solid;}
.loja-nome{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.loja-fat{font-size:1.3rem;font-weight:700;margin-bottom:4px;}
.loja-info{display:flex;gap:12px;font-size:11px;color:var(--txt2);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:20px;}
.card-title{font-size:13px;font-weight:600;color:var(--txt1);margin-bottom:16px;}
.chart-wrap{position:relative;height:240px;}
table.tb{width:100%;border-collapse:collapse;font-size:12px;}
table.tb th{background:rgba(255,255,255,0.03);color:var(--txt2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;padding:8px 12px;border-bottom:1px solid var(--bdr);text-align:left;}
table.tb th.r{text-align:right;}
table.tb td{padding:9px 12px;border-bottom:1px solid var(--bdr);color:var(--txt1);}
table.tb td.r{text-align:right;color:var(--txt2);}
table.tb td.val{text-align:right;font-weight:600;}
table.tb tr:last-child td{border-bottom:none;}
table.tb tr:hover td{background:rgba(255,255,255,0.02);}
.bar-row{margin-bottom:10px;}
.bar-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.bar-track{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s;}
.spin{width:24px;height:24px;border:2px solid var(--bdr);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.grid2,.lojas-grid{grid-template-columns:1fr;}}
</style>
</head>

function corLoja(n) { return LOJA_CORES[n] || '#6B7280'; }

async function buscarTudo(tabela, filtro) {
  var todos = [], offset = 0, tam = 1000;
  while (true) {
    var url = SB_URL + '/rest/v1/' + tabela + '?' + filtro + '&limit=' + tam + '&offset=' + offset;
    var r = await fetch(url, {headers: {apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY}});
    var lote = await r.json();
    if (!Array.isArray(lote) || lote.length === 0) break;
    todos = todos.concat(lote);
    if (lote.length < tam) break;
    offset += tam;
  }
  return todos;
}

var DE = null, ATE = null;

function setPeriodo(dias, el) {
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('on'); });
  el.classList.add('on');
  var ate = new Date(), de = new Date();
  de.setDate(de.getDate() - dias);
  DE  = de.toISOString().split('T')[0];
  ATE = ate.toISOString().split('T')[0];
  document.getElementById('dt-de').value  = DE;
  document.getElementById('dt-ate').value = ATE;
  carregar();
}

function aplicarFiltro() {
  DE  = document.getElementById('dt-de').value;
  ATE = document.getElementById('dt-ate').value;
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('on'); });
  carregar();
}

async function carregar() {
  if (!DE || !ATE) return;
  document.getElementById('kpis').innerHTML = '<div class="kpi"><div class="kpi-lbl">Carregando...</div><div class="spin"></div></div>';

  var filtroOp   = 'select=data_pedido,valor_bruto,loja_nome,status&data_pedido=gte.' + DE + '&data_pedido=lte.' + ATE + '&origem_conta=eq.kwid';
  var filtroHist = 'select=data_pedido,valor_bruto,loja_nome,status&data_pedido=gte.' + DE + '&data_pedido=lte.' + ATE + '&origem_conta=eq.kwid';

  try {
    var res = await Promise.all([
      buscarTudo('pedidos', filtroOp),
      buscarTudo('pedidos_historico', filtroHist)
    ]);

    var todos  = res[0].concat(res[1]);
    var ativos = todos.filter(function(p) {
      return (p.status || '').toLowerCase() !== 'cancelado' &&
             p.loja_nome && IGNORAR.indexOf(p.loja_nome) < 0;
    });

    var porLoja = {};
    ativos.forEach(function(p) {
      var l = p.loja_nome;
      if (!porLoja[l]) porLoja[l] = {nome: l, fat: 0, ped: 0};
      porLoja[l].fat += parseFloat(p.valor_bruto || 0);
      porLoja[l].ped++;
    });

    var lojas    = Object.values(porLoja).sort(function(a, b) { return b.fat - a.fat; });
    var fatTotal = lojas.reduce(function(s, l) { return s + l.fat; }, 0);
    var pedTotal = lojas.reduce(function(s, l) { return s + l.ped; }, 0);
    var diasP    = Math.max(1, Math.round((new Date(ATE) - new Date(DE)) / 86400000));

    document.getElementById('kpis').innerHTML =
      '<div class="kpi"><div class="kpi-lbl">Faturamento Total</div><div class="kpi-val">' + fmt(fatTotal) + '</div><div class="kpi-sub">' + fmtN(pedTotal) + ' pedidos</div></div>' +
      '<div class="kpi"><div class="kpi-lbl">Ticket Médio</div><div class="kpi-val kv-blue">' + fmt(pedTotal > 0 ? fatTotal / pedTotal : 0) + '</div><div class="kpi-sub">por pedido</div></div>' +
      '<div class="kpi"><div class="kpi-lbl">Fat/Dia</div><div class="kpi-val kv-green">' + fmt(fatTotal / diasP) + '</div><div class="kpi-sub">média diária</div></div>' +
      '<div class="kpi"><div class="kpi-lbl">Lojas Ativas</div><div class="kpi-val kv-amber">' + lojas.length + '</div><div class="kpi-sub">no período</div></div>' +
      '<div class="kpi"><div class="kpi-lbl">Pedidos/Dia</div><div class="kpi-val">' + Math.round(pedTotal / diasP) + '</div><div class="kpi-sub">média diária</div></div>';

    document.getElementById('lojas-cards').innerHTML = lojas.map(function(l) {
      return '<div class="loja-card" style="border-left-color:' + corLoja(l.nome) + '">' +
        '<div class="loja-nome" style="color:' + corLoja(l.nome) + '">' + l.nome + '</div>' +
        '<div class="loja-fat" style="color:' + corLoja(l.nome) + '">' + fmt(l.fat) + '</div>' +
        '<div class="loja-info"><span>' + fmtN(l.ped) + ' pedidos</span><span>TM ' + fmt(l.ped > 0 ? l.fat / l.ped : 0) + '</span><span>' + fmtP(fatTotal > 0 ? l.fat / fatTotal * 100 : 0) + '</span></div></div>';
    }).join('');

    var maxFat = Math.max.apply(null, lojas.map(function(l) { return l.fat; }).concat([1]));
    document.getElementById('loja-bars').innerHTML = lojas.map(function(l) {
      return '<div class="bar-row"><div class="bar-lbl"><span style="color:var(--txt1);font-weight:500">' + l.nome + '</span><span style="color:var(--txt2)">' + fmt(l.fat) + '</span></div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + Math.round(l.fat / maxFat * 100) + '%;background:' + corLoja(l.nome) + '"></div></div></div>';
    }).join('');

    var tms = lojas.map(function(l) { return l.ped > 0 ? l.fat / l.ped : 0; });
    var maxTm = Math.max.apply(null, tms.concat([1]));
    document.getElementById('ticket-bars').innerHTML = lojas.map(function(l, i) {
      var tm = tms[i];
      return '<div class="bar-row"><div class="bar-lbl"><span style="color:var(--txt1);font-weight:500">' + l.nome + '</span><span style="color:var(--txt2)">' + fmt(tm) + '</span></div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + Math.round(tm / maxTm * 100) + '%;background:' + corLoja(l.nome) + '"></div></div></div>';
    }).join('');

    document.getElementById('tabela-lojas').innerHTML = lojas.map(function(l) {
      return '<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + corLoja(l.nome) + ';margin-right:8px;"></span>' + l.nome + '</td>' +
        '<td class="val">' + fmtN(l.ped) + '</td><td class="val">' + fmt(l.fat) + '</td>' +
        '<td class="val">' + fmt(l.ped > 0 ? l.fat / l.ped : 0) + '</td>' +
        '<td class="r">' + fmtP(fatTotal > 0 ? l.fat / fatTotal * 100 : 0) + '</td>' +
        '<td class="r">' + fmt(l.fat / diasP) + '</td></tr>';
    }).join('');

    var porDia = {};
    ativos.forEach(function(p) {
      var d = p.data_pedido;
      if (!d) return;
      if (!porDia[d]) porDia[d] = 0;
      porDia[d] += parseFloat(p.valor_bruto || 0);
    });
    var dl = Object.keys(porDia).sort();
    var lbs = dl.map(function(d) {
      return new Date(d + 'T12:00:00').toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
    });

    if (chartFat) chartFat.destroy();
    chartFat = new Chart(document.getElementById('chart-fat'), {
      type: 'line',
      data: {labels: lbs, datasets: [{label: 'Fat.', data: dl.map(function(d) { return porDia[d]; }),
        borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.08)', fill: true, tension: 0.4, pointRadius: 2, borderWidth: 2}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}},
        scales: {x: {ticks: {color: '#71717a', maxTicksLimit: 8, font: {size: 10}}, grid: {color: 'rgba(255,255,255,0.04)'}},
          y: {ticks: {color: '#71717a', font: {size: 10}, callback: function(v) { return 'R$' + Math.round(v / 1000) + 'k'; }}, grid: {color: 'rgba(255,255,255,0.04)'}}}}
    });

    if (chartComp) chartComp.destroy();
    chartComp = new Chart(document.getElementById('chart-comp'), {
      type: 'bar',
      data: {labels: lojas.map(function(l) { return l.nome.replace('Loja ', ''); }),
        datasets: [{label: 'Pedidos/dia', data: lojas.map(function(l) { return parseFloat((l.ped / diasP).toFixed(1)); }),
          backgroundColor: lojas.map(function(l) { return corLoja(l.nome) + '99'; }),
          borderColor: lojas.map(function(l) { return corLoja(l.nome); }), borderWidth: 1, borderRadius: 4}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}},
        scales: {x: {ticks: {color: '#71717a', font: {size: 10}}, grid: {display: false}},
          y: {ticks: {color: '#71717a', font: {size: 10}}, grid: {color: 'rgba(255,255,255,0.04)'}}}}
    });

    document.getElementById('upd').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR');
  } catch(err) {
    console.error(err);
    document.getElementById('kpis').innerHTML = '<div class="kpi"><div class="kpi-lbl">Erro</div><div class="kpi-val kv-red">!</div><div class="kpi-sub">' + err.message + '</div></div>';
  }
}

var hoje = new Date(), ini = new Date();
ini.setDate(ini.getDate() - 30);
DE  = ini.toISOString().split('T')[0];
ATE = hoje.toISOString().split('T')[0];
document.getElementById('dt-de').value  = DE;
document.getElementById('dt-ate').value = ATE;
carregar();
</script>
</body>
</html>
