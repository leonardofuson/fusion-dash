<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fusion — Lojas v3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--bg:#09090b;--bg2:#18181b;--bg3:#27272a;--bdr:#2a2a2e;--txt1:#fafafa;--txt2:#a1a1aa;--txt3:#8b8b95;
  --blue:#6366f1;--green:#22c55e;--red:#f43f5e;--amber:#eab308;--purple:#a855f7;--pink:#ec4899;--cyan:#06b6d4;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--txt1);min-height:100vh;}
.topbar{background:rgba(9,9,11,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bdr);height:64px;display:flex;align-items:center;padding:0 1.5rem;gap:16px;position:sticky;top:0;z-index:1000;isolation:isolate;}
.topbar img{height:32px;object-fit:contain;}
.topbar-div{width:1px;height:18px;background:var(--bdr);}
.topbar-label{font-size:15px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--txt1);}
.main{max-width:1440px;margin:0 auto;padding:1.5rem;}
.filtros{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--bdr);background:transparent;color:var(--txt2);cursor:pointer;transition:all 0.2s;}
.chip:hover{border-color:var(--green);color:var(--green);}
.chip.on{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 0 12px rgba(34,197,94,0.3);}
.chip-sm{padding:4px 11px;border-radius:14px;font-size:11px;font-weight:600;border:1px solid var(--bdr);background:transparent;color:var(--txt2);cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.chip-sm:hover{border-color:var(--green);color:var(--green);}
.chip-sm.on{color:#fff!important;background:var(--green);border-color:var(--green);}
.drange{display:flex;gap:8px;align-items:center;}
.dinput{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--txt1);font-family:inherit;outline:none;}
.btnf{background:var(--green);border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;transition:box-shadow 0.2s;}
.btnf:hover{box-shadow:0 0 12px rgba(34,197,94,0.3);}
.toggle{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--txt2);cursor:pointer;user-select:none;}
.toggle input{accent-color:var(--green);}
.filter-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:1rem;padding:10px 14px;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;}
.filter-label{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:0.06em;white-space:nowrap;}

.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:1rem;}
.highlights{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem;}
.hl-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:16px 18px;}
.hl-title{font-size:10px;font-weight:700;color:#d4d4d8;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.hl-lider-name{font-size:1.25rem;font-weight:800;line-height:1.1;margin-bottom:6px;}
.hl-lider-bar{background:var(--bg);border-radius:4px;height:6px;overflow:hidden;margin:10px 0 6px;}
.hl-lider-bar-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}
.hl-lider-val{font-size:1.1rem;font-weight:800;color:var(--txt1);font-variant-numeric:tabular-nums;margin-top:4px;}
.hl-lider-sub{font-size:10px;color:#d4d4d8;font-weight:600;margin-top:2px;}
.hl-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.hl-mini{background:var(--bg3);border:1px solid var(--bdr);border-radius:10px;padding:10px;cursor:pointer;transition:transform 0.15s,border-color 0.15s;position:relative;min-width:0;}
.hl-mini:hover{transform:translateY(-2px);border-color:var(--green);}
.hl-mini.active{border-color:var(--green);box-shadow:0 0 0 2px rgba(34,197,94,0.3);}
.hl-mini-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.hl-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;text-shadow:0 1px 2px rgba(0,0,0,0.4);overflow:hidden;position:relative;}
.hl-avatar img{width:100%;height:100%;object-fit:cover;}
.hl-rank{position:absolute;top:8px;right:10px;font-size:11px;font-weight:800;color:var(--txt3);}
.hl-mini.rank-1 .hl-rank{color:#fbbf24;}
.hl-name{font-size:11px;font-weight:700;color:var(--txt1);line-height:1.25;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:28px;}
.hl-val{font-size:13px;font-weight:800;color:var(--txt1);font-variant-numeric:tabular-nums;margin-top:6px;}
.hl-sub{font-size:10px;color:#d4d4d8;font-weight:600;margin-top:2px;}
@media(max-width:900px){.highlights{grid-template-columns:1fr;}}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:16px;transition:transform 0.2s,box-shadow 0.2s;position:relative;overflow:hidden;}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.kpi.hero{grid-column:span 1;}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#d4d4d8;margin-bottom:6px;}
.kpi-val{font-size:1.35rem;font-weight:800;color:var(--txt1);line-height:1;font-variant-numeric:tabular-nums;}
.kpi.hero .kpi-val{font-size:1.5rem;}
.kpi-sub{font-size:10px;color:var(--txt3);margin-top:4px;}
.kpi-delta{font-size:11px;font-weight:700;margin-top:6px;}
.kpi-spark{position:absolute;right:0;bottom:0;width:60%;height:32px;opacity:0.6;pointer-events:none;}
.kpi.hero .kpi-spark{width:55%;height:48px;opacity:0.5;}
.d-up{color:var(--green);}
.d-dn{color:var(--red);}
.d-flat{color:var(--txt3);}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:14px;font-variant-numeric:tabular-nums;}
.card-title{font-size:13px;font-weight:700;color:var(--txt1);margin-bottom:14px;letter-spacing:0.02em;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.chart-wrap{position:relative;height:260px;}
.chart-hero{position:relative;height:360px;}
.chart-sm{position:relative;height:220px;}

/* `.tb-wrap-scroll` e `#sku-list` têm max-height inline → são scroll containers internos.
   Sticky thead aqui deve travar em top:0 (topo do container), NÃO top:64px (que seria pra página). */
.tb-wrap-scroll{overflow:auto;border-radius:10px;}
table.tb{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;}
table.tb thead th{position:sticky;top:0;z-index:10;background:var(--bg2);}
table.tb th{background:var(--bg2);color:var(--txt2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:8px 10px;text-align:left;white-space:nowrap;}
#sku-list table.tb thead th,.tb-wrap-scroll table.tb thead th{position:sticky;top:0;z-index:10;background:var(--bg2);padding-top:10px;padding-bottom:16px;box-shadow:inset 0 -2px 0 var(--bdr);}
table.tb th.r{text-align:right;}
table.tb th.sortable{cursor:pointer;user-select:none;}
table.tb th.sortable:hover{color:var(--green);}
table.tb th.sortable::after{content:'⇅';margin-left:4px;font-size:8px;opacity:0.4;}
table.tb th.sortable.asc::after{content:'▲';opacity:1;color:var(--green);}
table.tb th.sortable.desc::after{content:'▼';opacity:1;color:var(--green);}
table.tb td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--txt1);}
table.tb td.r{text-align:right;color:var(--txt2);}
table.tb td.val{text-align:right;font-weight:600;font-variant-numeric:tabular-nums;}
table.tb tr:last-child td{border-bottom:none;}
table.tb tr:hover td{background:rgba(255,255,255,0.06);}

.delta-badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;}
.delta-badge.up{background:rgba(34,197,94,0.12);color:var(--green);}
.delta-badge.down{background:rgba(244,63,94,0.12);color:var(--red);}
.delta-badge.flat{background:rgba(161,161,170,0.15);color:#d4d4d8;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;box-shadow:0 0 6px currentColor;}

.spin{width:24px;height:24px;border:2px solid var(--bdr);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-back,.btn-logout-tb,.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--txt2);padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block;transition:all 0.15s;}
.btn-back:hover{border-color:var(--blue);color:var(--blue);}
.btn-logout-tb:hover{border-color:var(--red);color:var(--red);}
.btn-ghost:hover{border-color:var(--green);color:var(--green);}
#user-info-tb{font-size:13px;color:var(--txt2);}
.topbar-actions{display:flex;align-items:center;gap:14px;margin-left:auto;}

.canal-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:900px){.canal-cards{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.canal-cards{grid-template-columns:1fr;}}
.canal-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:12px;padding:16px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;}
.canal-card{cursor:pointer;}
.canal-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,0.35);}
.canal-card.cc-highlight{outline:2px solid var(--canal-cor);outline-offset:-2px;box-shadow:0 0 20px rgba(255,255,255,0.05);}
.canal-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--canal-cor);}
.cc-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.cc-dot{width:10px;height:10px;border-radius:50%;background:var(--canal-cor);box-shadow:0 0 10px var(--canal-cor);}
.cc-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--canal-cor);}
.cc-receita{font-size:1.55rem;font-weight:800;color:var(--txt1);line-height:1;font-variant-numeric:tabular-nums;margin-bottom:4px;}
.cc-delta-row{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--txt3);margin-bottom:12px;}
.cc-bar-wrap{background:var(--bg);border-radius:4px;height:6px;overflow:hidden;margin-bottom:12px;position:relative;}
.cc-bar-fill{height:100%;border-radius:4px;background:var(--canal-cor);transition:width 0.6s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 8px var(--canal-cor);}
.cc-bar-lbl{font-size:11px;color:var(--txt1);text-align:right;margin-top:-2px;margin-bottom:10px;font-weight:700;font-variant-numeric:tabular-nums;}
.cc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);}
.cc-stat{text-align:center;}
.cc-stat-lbl{font-size:10px;font-weight:700;color:#d4d4d8;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.cc-stat-val{font-size:13px;font-weight:700;color:var(--txt1);font-variant-numeric:tabular-nums;}
.cc-stat-val.warn{color:var(--amber);}
.cc-stat-val.bad{color:var(--red);}
.cc-meta{padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);margin-top:10px;}
.cc-meta-lbl{font-size:9px;font-weight:700;color:#d4d4d8;text-transform:uppercase;letter-spacing:0.05em;display:flex;justify-content:space-between;margin-bottom:4px;}
.cc-meta-bar{background:var(--bg);border-radius:4px;height:8px;overflow:hidden;position:relative;}
.cc-meta-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);}
.cc-meta-mark{position:absolute;top:-2px;bottom:-2px;width:2px;background:#fafafa;opacity:0.5;}
.cc-spark-wrap{margin-top:10px;height:32px;position:relative;}
.btn-export{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:var(--green);padding:6px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-left:auto;letter-spacing:0.02em;}
.btn-export:hover{background:rgba(34,197,94,0.2);border-color:var(--green);box-shadow:0 0 12px rgba(34,197,94,0.2);}

.sku-header{display:flex;gap:20px;align-items:center;margin-bottom:14px;padding:14px;background:var(--bg3);border-radius:10px;}
.sku-stats{display:flex;gap:16px;flex-shrink:0;font-size:11px;color:#d4d4d8;}
.sku-thumb{width:56px;height:56px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--txt3);font-weight:800;flex-shrink:0;}
.sku-info{flex:1;min-width:0;}
.sku-name{font-size:15px;font-weight:700;color:var(--txt1);margin-bottom:3px;}
.sku-meta{font-size:11px;color:var(--txt2);display:flex;gap:16px;flex-wrap:wrap;}
.sku-meta b{color:var(--txt1);font-weight:700;font-variant-numeric:tabular-nums;}
.sku-input{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:9px 14px;font-size:13px;color:var(--txt1);font-family:inherit;outline:none;width:100%;max-width:360px;}
.sku-input:focus{border-color:var(--green);}
.sku-empty{padding:40px;text-align:center;color:var(--txt3);font-size:13px;}
.sku-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(234,179,8,0.12);color:var(--amber);margin-left:8px;}
.small-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.small-wrap{background:var(--bg3);border-radius:8px;padding:10px;}
.small-title{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.small-chart{position:relative;height:80px;}

.matrix-wrap{overflow-x:auto;}
table.matrix{font-size:11px;border-collapse:separate;border-spacing:3px;width:100%;}
table.matrix th{color:var(--txt2);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;padding:6px 8px;text-align:center;white-space:nowrap;}
table.matrix th:first-child{text-align:left;}
table.matrix td{padding:8px 6px;text-align:center;font-weight:600;font-variant-numeric:tabular-nums;border-radius:6px;color:#fafafa;text-shadow:0 1px 2px rgba(0,0,0,0.5);line-height:1.3;}
table.matrix td .mx-pct{font-size:12px;font-weight:700;display:block;}
table.matrix td .mx-qt{font-size:9px;opacity:0.85;font-weight:500;}
table.matrix td.empty{color:var(--txt3);text-shadow:none;font-size:14px;font-weight:400;}
table.matrix td:first-child{text-align:left;padding:8px 10px;color:var(--txt1);font-weight:600;background:var(--bg2);text-shadow:none;}
table.matrix th.mx-total-h{color:var(--amber);border-left:2px solid rgba(234,179,8,0.4);padding-left:10px;}
table.matrix td.mx-total{border-left:2px solid rgba(234,179,8,0.35);}

/* ---- Desktop polish ---- */
.dinput:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(34,197,94,0.2);}
.canal-card{border-radius:14px;}
.sku-comp-tb th{position:static!important;background:var(--bg2)!important;}
.sku-comp-tb th:first-child{position:sticky!important;left:0;z-index:5;background:#18181b!important;box-shadow:4px 0 6px rgba(0,0,0,0.4);}
.sku-comp-tb td:first-child{position:sticky!important;left:0;z-index:4;background:#18181b!important;white-space:nowrap;box-shadow:4px 0 6px rgba(0,0,0,0.4);}
.sku-comp-tb td:first-child::after,.sku-comp-tb th:first-child::after{display:none!important;}
.sku-comp-tb th:nth-child(n+2){position:static!important;}
.sku-comp-tb th:nth-child(n+2)::after,.sku-comp-tb td:nth-child(n+2)::after{display:none!important;}
#sku-list table.tb td:first-child{position:sticky;left:0;z-index:4;background:#18181b;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;box-shadow:4px 0 6px rgba(0,0,0,0.4);}
#sku-list table.tb th:first-child{position:sticky;left:0;top:0;z-index:6;background:#18181b;box-shadow:4px 0 6px rgba(0,0,0,0.4);}
#sku-list table.tb td:first-child::after,#sku-list table.tb th:first-child::after{display:none;}

/* ---- Responsive: tablet ---- */
@media(max-width:1100px){
  .kpi-grid{grid-template-columns:repeat(3,1fr);}
  .hl-row{grid-template-columns:repeat(3,1fr);}
  .canal-cards{grid-template-columns:repeat(2,1fr);}
}
/* ---- Responsive: small tablet / large phone ---- */
@media(max-width:768px){
  .main{padding:1rem;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .kpi.hero{grid-column:span 1;}
  .grid2{grid-template-columns:1fr;}
  .small-grid{grid-template-columns:1fr;}
  .highlights{grid-template-columns:1fr;}
  .hl-row{grid-template-columns:repeat(3,1fr);}
  .canal-cards{grid-template-columns:1fr 1fr;}
  .card-title{flex-wrap:wrap;gap:8px;}
  .btn-export{width:auto;}
  .filtros{flex-direction:column;align-items:stretch;gap:8px;}
  .chips{justify-content:center;}
  .drange{width:100%;justify-content:center;}
  .dinput{flex:1;min-width:0;}
  .sku-input{max-width:100%;}
  .btn-back,.btn-logout-tb{padding:5px 10px;font-size:11px;}
  #user-info-tb{display:none;}
  .topbar-actions{gap:8px;}
  .topbar{height:56px!important;padding:0 1rem!important;}
  .topbar img{height:26px!important;}
  .topbar-label{font-size:12px!important;}
  .kpi-val{font-size:1.2rem!important;}
  .cc-receita{font-size:1.3rem!important;}
}
/* ---- Responsive: phone ---- */
@media(max-width:480px){
  .main{padding:0.75rem;}
  .kpi-grid{grid-template-columns:1fr;gap:8px;}
  .highlights{gap:8px;}
  .hl-row{grid-template-columns:repeat(2,1fr);gap:6px;}
  .hl-mini{padding:8px;}
  .hl-name{font-size:10px;}
  .hl-val{font-size:12px;}
  .hl-sub{font-size:9px;}
  .canal-cards{grid-template-columns:1fr;gap:10px;}
  .card{padding:12px;margin-bottom:10px;}
  .card-title{flex-direction:column;align-items:flex-start;gap:6px;font-size:12px;}
  .card-title .btn-export{width:100%;text-align:center;}
  .chip,.chip-sm{padding:8px 12px;font-size:11px;}
  .filter-row{padding:8px 10px;flex-direction:column;align-items:stretch;}
  .filter-row .chips{justify-content:flex-start;}
  .chart-hero{height:280px;}

  /* Tabelas mobile — scroll horizontal com colunas fixas */
  table.tb{font-size:10px;}
  table.tb th,table.tb td{padding:5px 6px;}

  /* SKU table: nome fixo + truncado */
  #sku-list{max-height:55vh;overflow:auto;-webkit-overflow-scrolling:touch;}
  #sku-list table.tb{min-width:520px;}
  #sku-list table.tb td:first-child{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

  /* Vendedores table: # e nome fixos */
  .tb-wrap-scroll{max-height:55vh;overflow:auto;-webkit-overflow-scrolling:touch;}
  .tb-wrap-scroll table.tb{min-width:480px;}
  .tb-wrap-scroll table.tb td:nth-child(1),.tb-wrap-scroll table.tb th:nth-child(1){position:sticky;left:0;z-index:4;background:var(--bg2);min-width:24px;}
  .tb-wrap-scroll table.tb td:nth-child(2),.tb-wrap-scroll table.tb th:nth-child(2){position:sticky;left:24px;z-index:4;background:var(--bg2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tb-wrap-scroll table.tb th:nth-child(1){z-index:6;}
  .tb-wrap-scroll table.tb th:nth-child(2){z-index:6;}

}

<body>

<header class="topbar">

<script>
var SB_URL='https://spulbhnmkomvgohzhfvj.supabase.co';
var MAX_PAGES=50, BATCH_SZ=400;
let AUTH_HEADERS=null;

Chart.defaults.font.family="'Inter',sans-serif";
Chart.defaults.font.size=11;
Chart.defaults.font.weight='400';
Chart.defaults.font.lineHeight=1.6;
Chart.defaults.color='#a1a1aa';

// ---- Loja normalization ----
var LOJA_CORES={
  'Oriente':'#6366f1','Marcolina':'#22c55e','São Bernardo':'#eab308',
  'Vautier':'#a855f7','Polo Plaza':'#ec4899','Atacado WhatsApp':'#06b6d4',
  'Outras Receitas Lojas':'#ef4444'
};
var CAT_CORES={
  'CALÇA':'#6366f1','CAMISA':'#22c55e','CAMISETA':'#eab308','BLAZER & TERNO':'#a855f7',
  'BERMUDA':'#ec4899','INVERNO':'#06b6d4','CALÇADOS':'#f43f5e','ACESSÓRIOS':'#f97316'
};
function corCat(c){return CAT_CORES[c]||'#64748b';}
function iniciais(nome){
  var parts=(nome||'').trim().split(/\s+/);
  if(parts.length===0||!parts[0]) return '?';
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function avatarHtml(nome,corFallback,rank){
  var ini=iniciais(nome);
  var parts=(nome||'').trim().split(/\s+/);
  var norm=function(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9-]/g,'');};
  var first=norm(parts[0]||'');
  var firstTwo=parts.length>=2?norm(parts[0]+'-'+parts[1]):first;
  var crown='';
  return '<div style="position:relative;flex-shrink:0;">'+(rank===1?'<span style="position:absolute;top:-18px;right:-10px;z-index:4;font-size:16px;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.6));transform:rotate(20deg);">&#x1F451;</span>':'')+
    '<div class="hl-avatar" style="background:'+corFallback+'">'+
    '<img src="/vendedores/'+firstTwo+'.jpg" onerror="this.src=\'/vendedores/'+first+'.jpg\';this.onerror=function(){this.style.display=\'none\'}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;z-index:1;">'+
    '<span>'+ini+'</span></div></div>';
}
var IGNORAR_LOJA=['Atacado WhatsApp'];

function getLoja(loja_nome,origem){
  if(origem==='flecha') return 'Atacado WhatsApp';
  return (loja_nome||'').trim()||'Outras Receitas Lojas';
}
function lojaDisplay(n){return n||'';}
function getCor(nome){return LOJA_CORES[nome]||'#64748b';}

function fmt(n){return 'R$\u00A0'+Math.round(n||0).toLocaleString('pt-BR');}
function fmtK(n){n=n||0;if(Math.abs(n)>=1e6) return 'R$\u00A0'+(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3) return 'R$\u00A0'+Math.round(n/1e3)+'k';return 'R$\u00A0'+Math.round(n);}
function fmtN(n){return Math.round(n||0).toLocaleString('pt-BR');}
function fmtP(n){return(n||0).toFixed(1)+'%';}
function fmtD(n){return(n||0).toFixed(1);}
function hojeSP(){return new Date().toLocaleString('sv-SE',{timeZone:'America/Sao_Paulo'}).slice(0,10);}
function somaDias(ds,d){var t=new Date(ds+'T00:00:00Z');t.setUTCDate(t.getUTCDate()+d);return t.toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((new Date(b+'T00:00:00Z')-new Date(a+'T00:00:00Z'))/86400000)+1;}
function inicioPedidos(){var h=hojeSP();var y=parseInt(h.slice(0,4));var m=parseInt(h.slice(5,7))-1;if(m<1){m=12;y--;}return y+'-'+String(m).padStart(2,'0')+'-01';}
function inicioMesSP(){return hojeSP().slice(0,7)+'-01';}
function fimMesSP(){
  var h=hojeSP();
  var y=parseInt(h.slice(0,4));
  var m=parseInt(h.slice(5,7));
  var nextM=m===12?1:m+1;
  var nextY=m===12?y+1:y;
  var d=new Date(Date.UTC(nextY,nextM-1,1));
  d.setUTCDate(d.getUTCDate()-1);
  return d.toISOString().slice(0,10);
}
function inicioAno(){return hojeSP().slice(0,4)+'-01-01';}

// ---- Fetch ----
async function buscarTudo(tab,filtro){
  var todos=[],off=0,tam=1000,pag=0;
  if(filtro.indexOf('order=')<0) filtro+='&order=id.asc';
  while(pag<MAX_PAGES){
    var url=SB_URL+'/rest/v1/'+tab+'?'+filtro+'&limit='+tam+'&offset='+off;
    var r=await fetch(url,{headers:AUTH_HEADERS});
    if(!r.ok) throw new Error(tab+' HTTP '+r.status);
    var lote=await r.json();
    if(!Array.isArray(lote)||lote.length===0) break;
    todos=todos.concat(lote);
    if(lote.length<tam) break;
    off+=tam;pag++;
  }
  return todos;
}

var SEL_PED='id,data_pedido,valor_bruto,loja_nome,origem_conta,status,vendedor';
var SEL_HIST='id,id_tiny_origem,data_pedido,valor_bruto,loja_nome,origem_conta,status,vendedor';

function buildFilt(de,ate,cols){
  return 'select='+cols+'&data_pedido=gte.'+de+'&data_pedido=lte.'+ate+
    '&origem_conta=eq.kwid';
}
async function fetchPedidos(de,ate){
  var inicio=inicioPedidos();
  if(de>=inicio) return buscarTudo('pedidos',buildFilt(de,ate,SEL_PED));
  if(ate<inicio){
    var h=await buscarTudo('pedidos_historico',buildFilt(de,ate,SEL_HIST));
    return h.map(function(p){p.id=p.id_tiny_origem||p.id;return p;});
  }
  var fimH=somaDias(inicio,-1);
  var r=await Promise.all([
    buscarTudo('pedidos_historico',buildFilt(de,fimH,SEL_HIST)),
    buscarTudo('pedidos',buildFilt(inicio,ate,SEL_PED))
  ]);
  var h=r[0].map(function(p){p.id=p.id_tiny_origem||p.id;return p;});
  return h.concat(r[1]);
}

async function fetchItensForIds(ids){
  if(!ids.length) return [];
  var batches=[];
  for(var i=0;i<ids.length;i+=BATCH_SZ){
    var chunk=ids.slice(i,i+BATCH_SZ);
    batches.push(buscarTudo('itens_pedido','select=pedido_id,quantidade,preco_unitario,desconto_item,produto_id&pedido_id=in.('+chunk.join(',')+')'));
  }
  var res=await Promise.all(batches);
  return [].concat.apply([],res);
}

var PROD_CACHE=null;
async function fetchProdutos(){
  if(PROD_CACHE) return PROD_CACHE;
  var lista=await buscarTudo('produtos','select=id,sku,sku_pai,nome,categoria,cor,tamanho,tipo&ativo=eq.true');
  var byId={}, bySku={};
  lista.forEach(function(p){
    byId[p.id]={
      sku:p.sku, sku_pai:p.sku_pai||p.sku, nome:p.nome||p.sku,
      cat:p.categoria||'OUTROS', cor:p.cor||'', tam:p.tamanho||''
    };
    bySku[p.sku]={nome:p.nome||p.sku, cat:p.categoria||'OUTROS'};
  });
  PROD_CACHE={byId:byId,bySku:bySku};
  return PROD_CACHE;
}

// ---- State ----
var DE=null, ATE=null;
var STATE={pedidos:[],anteriores:[],itens:[],prods:null,lojas:[],lojasSel:{},stackMode:'abs',skuGroups:[],skuSel:null,vendSel:null,totLoja:{},metas:{},metasLoaded:false,freshness:null,lojaHighlight:null,catSel:null};
var CHARTS={hero:null,pareto:null,sparkPed:null,sparkTM:null,sparkPA:null,lojaSparklines:[]};

function setPeriodo(preset,el){
  var h=hojeSP(), de, ate=h;
  switch(preset){
    case 'hoje': de=h; break;
    case 'ontem': de=somaDias(h,-1); ate=de; break;
    case '7d': de=somaDias(h,-6); break;
    case '30d': de=somaDias(h,-29); break;
    case 'mtd': de=inicioMesSP(); break;
    case 'ytd': de=inicioAno(); break;
    case '12m': de=somaDias(h,-364); break;
    default: de=somaDias(h,-29);
  }
  DE=de; ATE=ate;
  document.getElementById('dt-de').value=DE;
  document.getElementById('dt-ate').value=ATE;
  document.querySelectorAll('.chip[data-preset]').forEach(function(c){c.classList.remove('on');});
  if(el) el.classList.add('on');
  carregar();
}
function aplicarFiltro(){
  DE=document.getElementById('dt-de').value;
  ATE=document.getElementById('dt-ate').value;
  document.querySelectorAll('.chip[data-preset]').forEach(function(c){c.classList.remove('on');});
  carregar();
}
function setStack(m){
  STATE.stackMode=m;
  document.getElementById('stk-abs').classList.toggle('on',m==='abs');
  document.getElementById('stk-pct').classList.toggle('on',m==='pct');
  renderHero();
}

function periodoAnterior(de,ate){
  var dias=daysBetween(de,ate);
  var novoAte=somaDias(de,-1);
  var novoDe=somaDias(novoAte,-(dias-1));
  return {de:novoDe, ate:novoAte};
}

function filtrarPedidos(lista){
  var incCanc=document.getElementById('chk-canc').checked;
  var CANC=['cancelado','devolvido'];
  var ativos=[];
  lista.forEach(function(p){
    var nome=getLoja(p.loja_nome,p.origem_conta);
    if(IGNORAR_LOJA.indexOf(nome)>=0) return;
    var st=(p.status||'').toLowerCase();
    var isCanc=CANC.indexOf(st)>=0;
    if(isCanc && !incCanc) return;
    p._nome=nome;
    p._cor=getCor(nome);
    p._canc=isCanc;
    p._vend=(p.vendedor||'').trim()||'Vendedor Não Identificado';
    if(STATE.lojasSel && Object.keys(STATE.lojasSel).length>0 && !STATE.lojasSel[p._nome]) return;
    ativos.push(p);
  });
  return ativos;
}

async function carregar(){
  if(!DE||!ATE) return;
  document.getElementById('kpis').innerHTML='<div class="kpi hero"><div class="kpi-lbl">Carregando...</div><div class="spin"></div></div>';

  try {
    var usarComp=document.getElementById('chk-compare').checked;
    var ant=periodoAnterior(DE,ATE);

    var fetches=[fetchPedidos(DE,ATE)];
    if(usarComp) fetches.push(fetchPedidos(ant.de,ant.ate));
    var res=await Promise.all(fetches);
    STATE.pedidosRaw=res[0];
    STATE.anterioresRaw=usarComp?res[1]:[];

    if(STATE.lojas.length===0){
      var seen={};
      STATE.pedidosRaw.forEach(function(p){
        var n=getLoja(p.loja_nome,p.origem_conta);
        if(IGNORAR_LOJA.indexOf(n)>=0) return;
        if(!seen[n]){seen[n]=true;STATE.lojasSel[n]=true;}
      });
      STATE.lojas=Object.keys(seen).sort();
      renderLojaChips();
    }

    // ---- Itens for SKU drill (only se range overlaps M/M-1) ----
    var inicio=inicioPedidos();
    var skuDisponivel=(DE>=inicio)||(ATE>=inicio);
    if(skuDisponivel){
      var recentes=STATE.pedidosRaw.filter(function(p){
        if(p.data_pedido<inicio) return false;
        var n=getLoja(p.loja_nome,p.origem_conta);
        return IGNORAR_LOJA.indexOf(n)<0;
      });
      var ids=recentes.map(function(p){return p.id;}).filter(function(x){return x;});
      var itens=await fetchItensForIds(ids);
      var prods=await fetchProdutos();
      var pedById={};
      recentes.forEach(function(p){pedById[p.id]=p;});
      itens.forEach(function(it){
        var ped=pedById[it.pedido_id];
        if(!ped) return;
        var prod=prods.byId[it.produto_id];
        if(!prod) return;
        var skuPai=prod.sku_pai;
        var pai;
        if(/^MAT-/i.test(skuPai)){ skuPai=prod.sku; pai={nome:prod.nome,cat:prod.cat}; }
        else { pai=prods.bySku[skuPai]||{nome:prod.nome,cat:prod.cat}; }
        var nomePai=pai.nome;
        if(!nomePai||nomePai==='Material/Insumo'||nomePai==='Desconhecido') nomePai=skuPai;
        it._sku_pai=skuPai;
        it._nome=nomePai;
        it._cat=pai.cat||prod.cat;
        it._cor=prod.cor;
        it._tam=prod.tam;
        it._loja=getLoja(ped.loja_nome,ped.origem_conta);
        it._data=ped.data_pedido;
        it._receita=(parseFloat(it.preco_unitario)||0)*(parseFloat(it.quantidade)||0)-(parseFloat(it.desconto_item)||0);
        it._qtd=parseFloat(it.quantidade)||0;
        it._canc=(ped.status||'').toLowerCase();
      });
      STATE.itens=itens.filter(function(it){return it._sku_pai && (!['cancelado','devolvido'].includes(it._canc)) && it._cat!=='TECIDO' && it._cat!=='TROCA';});
      agruparSkus();
    } else {
      STATE.itens=[]; STATE.skuGroups=[];
    }

    // Fetch metas do mês atual (uma vez)
    if(!STATE.metasLoaded){
      try{
        var h=hojeSP();var mesAtual=parseInt(h.slice(5,7));var anoAtual=parseInt(h.slice(0,4));
        var metasRaw=await buscarTudo('metas_lojas','select=loja_nome,meta_receita&ano=eq.'+anoAtual+'&mes=eq.'+mesAtual);
        metasRaw.forEach(function(m){STATE.metas[m.loja_nome]=parseFloat(m.meta_receita)||0;});
        STATE.metasLoaded=true;
      }catch(e){console.warn('Metas não carregadas:',e.message);}
    }

    // Freshness: data mais recente nos pedidos
    var maxData=null;
    STATE.pedidosRaw.forEach(function(p){
      var d=(p.data_pedido||'').slice(0,10);
      if(d&&(!maxData||d>maxData)) maxData=d;
    });
    STATE.freshness=maxData;

    renderAll();
    var freshTxt=STATE.freshness?'Dados até '+new Date(STATE.freshness+'T12:00:00').toLocaleDateString('pt-BR'):'';
    document.getElementById('upd').textContent=freshTxt+' · Atualizado '+new Date().toLocaleTimeString('pt-BR');
  } catch(err) {
    console.error(err);
    document.getElementById('kpis').innerHTML='<div class="kpi hero"><div class="kpi-lbl">Erro</div><div class="kpi-val d-dn">!</div><div class="kpi-sub">'+err.message+'</div></div>';
  }
}

function renderLojaChips(){
  var el=document.getElementById('loja-chips');
  el.innerHTML=STATE.lojas.map(function(n){
    var on=STATE.lojasSel[n];
    var c=getCor(n);
    return '<button class="chip-sm'+(on?' on':'')+'" data-loja="'+n+'" style="'+(on?'background:'+c+';border-color:'+c:'')+'" onclick="toggleLoja(\''+n.replace(/'/g,"\\'")+'\',this)">'+lojaDisplay(n)+'</button>';
  }).join('');
}
function toggleLoja(n,el){
  STATE.lojasSel[n]=!STATE.lojasSel[n];
  var c=getCor(n);
  if(STATE.lojasSel[n]){ el.classList.add('on'); el.style.background=c; el.style.borderColor=c; }
  else { el.classList.remove('on'); el.style.background=''; el.style.borderColor=''; }
  renderAll();
}
function selAllLojas(){STATE.lojas.forEach(function(n){STATE.lojasSel[n]=true;});renderLojaChips();renderAll();}
function clearLojas(){STATE.lojas.forEach(function(n){STATE.lojasSel[n]=false;});renderLojaChips();renderAll();}

function renderAll(){
  STATE.pedidos=filtrarPedidos(STATE.pedidosRaw);
  STATE.anteriores=filtrarPedidos(STATE.anterioresRaw);
  renderKPIs();
  renderHighlights();
  renderHero();
  renderLojaCards();
  renderPareto();
  renderCatChips();
  renderSkuList();
  renderVendedores();
  if(STATE.skuSel) renderSkuDetail();
  syncToURL();
}

// ---- KPIs ----
function calcKPIs(pedidos){
  var fat=0, ped=0, canc=0, porLoja={};
  pedidos.forEach(function(p){
    var v=parseFloat(p.valor_bruto||0);
    if(p._canc){canc++;return;}
    fat+=v; ped++;
    if(!porLoja[p._nome]) porLoja[p._nome]={fat:0,ped:0,cor:p._cor};
    porLoja[p._nome].fat+=v;
    porLoja[p._nome].ped++;
  });
  var total=ped+canc;
  return {fat:fat,ped:ped,canc:canc,tm:ped>0?fat/ped:0,tc:total>0?canc/total*100:0,porLoja:porLoja};
}
function delta(a,b){if(!b) return null;return (a-b)/b*100;}
function deltaBadge(d){
  if(d===null||isNaN(d)) return '<span class="delta-badge flat">—</span>';
  var cls=d>=0.5?'up':(d<=-0.5?'down':'flat');
  var sign=d>=0?'+':'';
  return '<span class="delta-badge '+cls+'">'+sign+d.toFixed(1)+'%</span>';
}

// PA por loja a partir dos itens (e geral)
function calcPALoja(){
  var qtdPorLoja={}, pedPorLoja={};
  var pedSeen={};
  STATE.itens.forEach(function(it){
    if(STATE.lojasSel && Object.keys(STATE.lojasSel).length>0 && !STATE.lojasSel[it._loja]) return;
    qtdPorLoja[it._loja]=(qtdPorLoja[it._loja]||0)+it._qtd;
    var k=it._loja+'|'+it.pedido_id;
    if(!pedSeen[k]){pedSeen[k]=true;pedPorLoja[it._loja]=(pedPorLoja[it._loja]||0)+1;}
  });
  var paLoja={};
  Object.keys(qtdPorLoja).forEach(function(l){
    paLoja[l]=pedPorLoja[l]>0?qtdPorLoja[l]/pedPorLoja[l]:0;
  });
  return paLoja;
}

function renderKPIs(){
  var cur=calcKPIs(STATE.pedidos);
  var prev=calcKPIs(STATE.anteriores);

  // PA geral a partir dos itens
  var paGeral=null;
  if(STATE.itens.length>0){
    var pedIds={},qtd=0;
    STATE.itens.forEach(function(it){
      if(STATE.lojasSel[it._loja] || Object.keys(STATE.lojasSel).every(function(k){return !STATE.lojasSel[k];})){
        qtd+=it._qtd;
        pedIds[it.pedido_id]=true;
      }
    });
    var nPed=Object.keys(pedIds).length;
    paGeral=nPed>0?qtd/nPed:0;
  }

  var html='';
  // Projeção e meta integradas no KPI Receita
  var h=hojeSP();
  var inicioM=inicioMesSP();var fimM=fimMesSP();
  var diasDec=daysBetween(inicioM,h);var diasTot=daysBetween(inicioM,fimM);
  var fatMes=0;
  (STATE.pedidosRaw||[]).forEach(function(p){
    var d=(p.data_pedido||'').slice(0,10);
    if(d<inicioM||d>h) return;
    var st=(p.status||'').toLowerCase();
    if(st==='cancelado'||st==='devolvido') return;
    var nome=getLoja(p.loja_nome,p.origem_conta);
    if(IGNORAR_LOJA.indexOf(nome)>=0) return;
    fatMes+=parseFloat(p.valor_bruto||0);
  });
  var projTotal=diasDec>0?fatMes/diasDec*diasTot:0;
  var metaTotal=Object.values(STATE.metas).reduce(function(s,v){return s+v;},0);
  var pctMeta=metaTotal>0?fatMes/metaTotal*100:0;
  var projPctMeta=metaTotal>0?projTotal/metaTotal*100:0;

  html+='<div class="kpi hero">';
  html+='<div class="kpi-lbl">Receita Bruta</div>';
  html+='<div class="kpi-val">'+fmt(cur.fat)+'</div>';
  html+='<div class="kpi-delta">'+deltaBadge(delta(cur.fat,prev.fat))+' <span style="color:#d4d4d8">vs anterior</span></div>';
  if(metaTotal>0){
    var barW=pctMeta>100?100:pctMeta;
    var barC=pctMeta>=100?'var(--green)':(pctMeta>=70?'var(--amber)':'var(--red)');
    html+='<div style="margin-top:8px;">';
    html+='<div class="cc-meta-bar" style="height:6px;border-radius:3px;"><div class="cc-meta-fill" style="width:'+barW+'%;background:'+barC+';"></div></div>';
    html+='<div style="display:flex;justify-content:space-between;font-size:9px;margin-top:3px;color:#d4d4d8;font-weight:600;"><span style="color:'+barC+'">'+pctMeta.toFixed(0)+'% da meta</span><span>Meta: '+fmt(metaTotal)+'</span></div>';
    html+='</div>';
  }
  if(projTotal>0){
    var projC=metaTotal>0?(projPctMeta>=100?'var(--green)':(projPctMeta>=70?'var(--amber)':'var(--red)')):'var(--amber)';
    html+='<div style="margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06);">';
    html+='<div style="font-size:9px;font-weight:700;color:#d4d4d8;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;">Proj. mês'+(metaTotal>0?' · <span style="color:'+projC+'">'+projPctMeta.toFixed(0)+'% da meta</span>':'')+'</div>';
    html+='<div style="font-size:1.15rem;font-weight:800;color:'+projC+';font-variant-numeric:tabular-nums;">'+fmt(projTotal)+'</div>';
    html+='</div>';
  }
  html+='</div>';
  html+='<div class="kpi" style="position:relative;overflow:hidden"><div class="kpi-lbl">Pedidos</div><div class="kpi-val">'+fmtN(cur.ped)+'</div><div class="kpi-delta">'+deltaBadge(delta(cur.ped,prev.ped))+'</div><canvas class="kpi-spark" id="spark-ped"></canvas></div>';
  html+='<div class="kpi" style="position:relative;overflow:hidden"><div class="kpi-lbl">Ticket Médio</div><div class="kpi-val">'+fmt(cur.tm)+'</div><div class="kpi-delta">'+deltaBadge(delta(cur.tm,prev.tm))+'</div><canvas class="kpi-spark" id="spark-tm"></canvas></div>';
  html+='<div class="kpi hero">';
  html+='<div class="kpi-lbl">Peças / Atendimento</div>';
  html+='<div class="kpi-val">'+(paGeral!==null?fmtD(paGeral):'—')+'</div>';
  html+='<div class="kpi-sub">'+(paGeral!==null?'média do período':'fora do range 60d')+'</div>';
  html+='<canvas class="kpi-spark" id="spark-pa"></canvas>';
  html+='</div>';

  // Loja líder (5o card na mesma linha)
  var lojasArr=Object.keys(cur.porLoja).map(function(k){return {n:k,fat:cur.porLoja[k].fat};}).sort(function(a,b){return b.fat-a.fat;});
  var lider=lojasArr[0]||{n:'—',fat:0};
  var liderPrev=prev.porLoja&&prev.porLoja[lider.n]?prev.porLoja[lider.n].fat:0;
  var liderCor=getCor(lider.n);
  var liderNome=lojaDisplay(lider.n);
  html+='<div class="kpi kpi-lider" style="border-left:3px solid '+liderCor+'">';
  html+='<div class="kpi-lbl">Loja Líder</div>';
  html+='<div class="kpi-val" style="font-size:1.15rem;color:'+liderCor+'">'+liderNome+'</div>';
  html+='<div style="font-size:1.3rem;font-weight:800;color:var(--txt1);margin-top:6px;font-variant-numeric:tabular-nums;">'+fmt(lider.fat)+'</div>';
  html+='<div class="kpi-delta">'+deltaBadge(delta(lider.fat,liderPrev))+'</div>';
  html+='</div>';

  document.getElementById('kpis').innerHTML=html;

  // Sparklines com destroy pra evitar memory leak
  var sparkOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}};
  function mkSpark(id,key,labels,data,color){
    var el=document.getElementById(id);
    if(!el) return;
    if(CHARTS[key]) CHARTS[key].destroy();
    CHARTS[key]=new Chart(el,{type:'line',data:{labels:labels,datasets:[{data:data,borderColor:color,backgroundColor:color+'26',fill:true,tension:0.4,pointRadius:0,borderWidth:2}]},options:sparkOpts});
  }
  // Pedidos
  var diarioPed={},diarioFat2={},diarioCnt2={};
  STATE.pedidos.forEach(function(p){
    if(p._canc)return;
    var d=(p.data_pedido||'').slice(0,10);
    diarioPed[d]=(diarioPed[d]||0)+1;
    diarioFat2[d]=(diarioFat2[d]||0)+parseFloat(p.valor_bruto||0);
    diarioCnt2[d]=(diarioCnt2[d]||0)+1;
  });
  var kp=Object.keys(diarioPed).sort();
  mkSpark('spark-ped','sparkPed',kp,kp.map(function(k){return diarioPed[k];}),'#3b82f6');
  mkSpark('spark-tm','sparkTM',kp,kp.map(function(k){return diarioCnt2[k]>0?diarioFat2[k]/diarioCnt2[k]:0;}),'#f59e0b');
  // PA
  if(STATE.itens.length>0){
    var pedInfo={};
    STATE.pedidos.forEach(function(p){if(!p._canc) pedInfo[p.id]=p.data_pedido;});
    var porDiaPA={},porDiaPedPA={};
    STATE.itens.forEach(function(it){
      var d=(pedInfo[it.pedido_id]||'').slice(0,10);
      if(!d) return;
      porDiaPA[d]=(porDiaPA[d]||0)+it._qtd;
      if(!porDiaPedPA[d]) porDiaPedPA[d]={};
      porDiaPedPA[d][it.pedido_id]=true;
    });
    var paK=Object.keys(porDiaPA).sort();
    mkSpark('spark-pa','sparkPA',paK,paK.map(function(k){var n=porDiaPedPA[k]?Object.keys(porDiaPedPA[k]).length:1;return n>0?porDiaPA[k]/n:0;}),'#a855f7');
  }
}

// ---- Export Image ----
function exportImage(tipo){
  var btn=event.target;
  btn.textContent='Gerando...';
  btn.disabled=true;

  // Montar container temporário com só a tabela (sem detalhes/outros cards)
  var wrapper=document.createElement('div');
  wrapper.style.cssText='position:absolute;left:-9999px;top:0;background:#18181b;padding:20px;border-radius:14px;min-width:800px;font-family:Inter,sans-serif;color:#fafafa;';
  document.body.appendChild(wrapper);

  // Header
  var header=document.createElement('div');
  header.style.cssText='font-size:14px;font-weight:700;margin-bottom:12px;color:#fafafa;';
  var titles={'vendedores':'Top Vendedores','lojas':'Desempenho por Loja','produtos':'Venda de Produtos por Loja','top5vend':'Top 5 Vendedores'};
  header.textContent=titles[tipo]||tipo;
  wrapper.appendChild(header);

  var periodo=document.createElement('div');
  periodo.style.cssText='font-size:11px;color:#d4d4d8;margin-bottom:14px;';
  periodo.textContent='Período: '+new Date(DE+'T12:00:00').toLocaleDateString('pt-BR')+' a '+new Date(ATE+'T12:00:00').toLocaleDateString('pt-BR');
  wrapper.appendChild(periodo);

  var sourceEl;
  if(tipo==='vendedores'){
    sourceEl=document.querySelector('#tbody-vendedores').closest('.tb-wrap-scroll');
  } else if(tipo==='lojas'){
    sourceEl=document.getElementById('loja-cards');
  } else if(tipo==='top5vend'){
    sourceEl=document.querySelector('#highlights .hl-card');
  } else {
    var legend=document.getElementById('sku-legend');
    if(legend) wrapper.appendChild(legend.cloneNode(true));
    sourceEl=document.getElementById('sku-list');
  }

  var clone=sourceEl.cloneNode(true);
  clone.style.maxHeight='none';
  clone.style.overflow='visible';
  clone.style.borderRadius='10px';
  wrapper.appendChild(clone);

  // Rodapé
  var footer=document.createElement('div');
  footer.style.cssText='font-size:9px;color:#8b8b95;margin-top:12px;text-align:right;';
  footer.textContent='Fusion Grupo · '+new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR');
  wrapper.appendChild(footer);

  html2canvas(wrapper,{
    backgroundColor:'#18181b',
    scale:2,
    useCORS:true,
    logging:false
  }).then(function(canvas){
    document.body.removeChild(wrapper);
    canvas.toBlob(function(blob){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='fusion-lojas-'+tipo+'.png';
      a.click();
      setTimeout(function(){URL.revokeObjectURL(a.href);},1000);
      btn.textContent='Compartilhar';
      btn.disabled=false;
    },'image/png');
  }).catch(function(err){
    console.error(err);
    if(wrapper.parentElement) document.body.removeChild(wrapper);
    btn.textContent='Compartilhar';
    btn.disabled=false;
  });
}

// ---- URL State ----
function syncToURL(){
  var p=new URLSearchParams();
  if(DE) p.set('de',DE);
  if(ATE) p.set('ate',ATE);
  var preset=document.querySelector('.chip.on[data-preset]');
  if(preset) p.set('p',preset.dataset.preset);
  var lojasOn=STATE.lojas.filter(function(n){return STATE.lojasSel[n];});
  if(lojasOn.length>0&&lojasOn.length<STATE.lojas.length) p.set('lojas',lojasOn.join(','));
  history.replaceState(null,'',location.pathname+'?'+p.toString());
}
function loadFromURL(){
  var p=new URLSearchParams(location.search);
  if(p.has('de')) DE=p.get('de');
  if(p.has('ate')) ATE=p.get('ate');
  if(p.has('p')) return p.get('p');
  return null;
}

// ---- Hero: plugin to draw fixed daily totals above each stack ----
var heroTotalsPlugin={
  id:'heroTotals',
  afterDatasetsDraw:function(chart){
    if(chart.canvas.id!=='chart-hero') return;
    if(STATE.stackMode!=='abs') return;
    var ctx=chart.ctx;
    var dss=chart.data.datasets.filter(function(ds){return ds.stack==='A';});
    if(dss.length===0) return;
    var nPts=dss[0].data.length;
    var totals=[];
    for(var i=0;i<nPts;i++){
      var s=0;
      dss.forEach(function(ds){s+=ds.data[i]||0;});
      totals.push(s);
    }
    var step=1;
    if(nPts>60) step=Math.ceil(nPts/15);
    else if(nPts>30) step=Math.ceil(nPts/20);
    var topMeta=chart.getDatasetMeta(dss.length-1);
    ctx.save();
    ctx.font='700 10px Inter,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='bottom';
    for(var i=0;i<nPts;i++){
      if(i%step!==0 && i!==nPts-1) continue;
      var pt=topMeta.data[i];
      if(!pt) continue;
      var v=totals[i];
      if(v<=0) continue;
      var txt=v>=1e6?'R$ '+(v/1e6).toFixed(1)+'M':(v>=1e3?'R$ '+(v/1e3).toFixed(1)+'k':'R$ '+Math.round(v));
      var x=pt.x, y=pt.y-8;
      var w=ctx.measureText(txt).width;
      ctx.fillStyle='rgba(9,9,11,0.85)';
      ctx.strokeStyle='rgba(34,197,94,0.5)';
      ctx.lineWidth=1;
      var rx=w/2+6;
      ctx.beginPath();
      ctx.moveTo(x-rx+4,y-14);
      ctx.arcTo(x+rx,y-14,x+rx,y,4);
      ctx.arcTo(x+rx,y,x-rx,y,4);
      ctx.arcTo(x-rx,y,x-rx,y-14,4);
      ctx.arcTo(x-rx,y-14,x+rx,y-14,4);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle='#fafafa';
      ctx.fillText(txt,x,y-2);
    }
    ctx.restore();
  }
};

// ---- Hero stacked area ----
function renderHero(){
  var diario={};
  var lojas={};
  STATE.pedidos.forEach(function(p){
    if(p._canc) return;
    var d=(p.data_pedido||'').slice(0,10);
    if(!d) return;
    if(!diario[d]) diario[d]={};
    diario[d][p._nome]=(diario[d][p._nome]||0)+parseFloat(p.valor_bruto||0);
    lojas[p._nome]=p._cor;
  });
  var dias=Object.keys(diario).sort();
  var lojasL=Object.keys(lojas).sort(function(a,b){
    var sa=0,sb=0; dias.forEach(function(d){sa+=diario[d][a]||0;sb+=diario[d][b]||0;});
    return sb-sa;
  });

  // ---- Projeção do mês ----
  // Só ativa se stackMode==='abs' e o range inclui hoje.
  // Extende o chart até o fim do mês e adiciona uma linha pontilhada
  // projetada a partir de média por dia da semana + média diária observada.
  var hoje=hojeSP();
  var projActive=(STATE.stackMode==='abs') && DE<=hoje && ATE>=hoje;
  var projValues=null;
  var diasExtras=[];
  if(projActive){
    var fimMes=fimMesSP();
    // Total diário por dia (já observado no range)
    var totPorDia={};
    dias.forEach(function(d){
      var t=0; lojasL.forEach(function(n){t+=diario[d][n]||0;});
      totPorDia[d]=t;
    });
    // DOW averages a partir dos dias observados (exclui dias futuros do range que ainda não chegaram)
    var dowSum=[0,0,0,0,0,0,0], dowCnt=[0,0,0,0,0,0,0];
    Object.keys(totPorDia).forEach(function(d){
      if(d>hoje) return;
      var idx=dowIdx(d);
      dowSum[idx]+=totPorDia[d];
      dowCnt[idx]++;
    });
    var dowAvg=dowSum.map(function(s,i){return dowCnt[i]>0?s/dowCnt[i]:0;});
    // Se algum DOW sem dados, usa média geral como fallback
    var geral=0, cntG=0;
    Object.keys(totPorDia).forEach(function(d){if(d<=hoje){geral+=totPorDia[d];cntG++;}});
    var mediaGeral=cntG>0?geral/cntG:0;
    for(var i=0;i<7;i++){if(dowAvg[i]===0) dowAvg[i]=mediaGeral;}

    // Dias extras de hoje+1 até fimMes que não estão em `dias`
    var cursor=hoje;
    while(true){
      cursor=somaDias(cursor,1);
      if(cursor>fimMes) break;
      if(dias.indexOf(cursor)<0) diasExtras.push(cursor);
    }
    var diasAll=dias.concat(diasExtras);
    // Valores projetados alinhados com diasAll
    projValues=diasAll.map(function(d){
      if(d<hoje) return null;
      if(d===hoje){
        // conecta com total real de hoje se existir, senão projeta
        if(totPorDia[d]!=null && totPorDia[d]>0) return totPorDia[d];
        return dowAvg[dowIdx(d)];
      }
      return dowAvg[dowIdx(d)];
    });
    // Atualiza dias e cada dataset de loja (adiciona 0 pra dias extras)
    dias=diasAll;
  }

  var showPoints=dias.length<=45;
  var datasets=lojasL.map(function(n){
    var vals=dias.map(function(d){return diario[d]?(diario[d][n]||0):0;});
    if(STATE.stackMode==='pct'){
      vals=vals.map(function(v,i){
        var tot=0; lojasL.forEach(function(m){tot+=diario[dias[i]]?(diario[dias[i]][m]||0):0;});
        return tot>0?(v/tot*100):0;
      });
    }
    var isHL=STATE.lojaHighlight;
    var dimmed=isHL&&isHL!==n;
    return {label:lojaDisplay(n),data:vals,
      borderColor:dimmed?lojas[n]+'33':lojas[n],
      backgroundColor:dimmed?lojas[n]+'11':lojas[n]+'55',
      fill:true,tension:0.35,
      pointRadius:showPoints?(dimmed?0:3):0,pointBackgroundColor:lojas[n],pointBorderColor:'#09090b',pointBorderWidth:1.5,pointHoverRadius:6,
      borderWidth:dimmed?1:2.5,stack:'A'};
  });
  if(projActive && projValues){
    datasets.push({
      label:'Projeção',
      data:projValues,
      borderColor:'#fbbf24',
      backgroundColor:'transparent',
      borderDash:[6,4],
      fill:false,
      tension:0.3,
      pointRadius:0,
      pointHoverRadius:5,
      borderWidth:2,
      stack:null,
      spanGaps:true

// ---- Loja cards ----
function calcProjMesLoja(){
  var hoje=hojeSP();
  var inicioMes=inicioMesSP();
  var fimMes=fimMesSP();
  var diasDecorridos=daysBetween(inicioMes,hoje);
  var diasTotalMes=daysBetween(inicioMes,fimMes);
  // Fat do mês atual por loja
  var fatMesLoja={};
  STATE.pedidosRaw.forEach(function(p){
    var d=(p.data_pedido||'').slice(0,10);
    if(d<inicioMes||d>hoje) return;
    var st=(p.status||'').toLowerCase();
    if(st==='cancelado'||st==='devolvido') return;
    var nome=getLoja(p.loja_nome,p.origem_conta);
    if(IGNORAR_LOJA.indexOf(nome)>=0) return;
    fatMesLoja[nome]=(fatMesLoja[nome]||0)+parseFloat(p.valor_bruto||0);
  });
  // Projeção simples: (fat acumulado / dias decorridos) * dias total mês
  var proj={};
  if(diasDecorridos>0){
    Object.keys(fatMesLoja).forEach(function(l){
      proj[l]=fatMesLoja[l]/diasDecorridos*diasTotalMes;
    });
  }
  return proj;
}

function renderLojaCards(){
  var cur=calcKPIs(STATE.pedidos).porLoja;
  var prev=calcKPIs(STATE.anteriores).porLoja;
  var fatTotal=Object.values(cur).reduce(function(s,c){return s+c.fat;},0);
  var nomes=Object.keys(cur).sort(function(a,b){return cur[b].fat-cur[a].fat;});
  var paLoja=calcPALoja();
  var projMes=calcProjMesLoja();

  // Pre-compute: sparkline data + fat mês por loja (uma passada só)
  var sparkData={}, fatMesPorLoja={};
  var _inicioM=inicioMesSP(), _hojeC=hojeSP();
  STATE.pedidos.forEach(function(p){
    if(p._canc) return;
    var d=(p.data_pedido||'').slice(0,10);
    if(!sparkData[p._nome]) sparkData[p._nome]={};
    sparkData[p._nome][d]=(sparkData[p._nome][d]||0)+parseFloat(p.valor_bruto||0);
  });
  (STATE.pedidosRaw||[]).forEach(function(p2){
    var d2=(p2.data_pedido||'').slice(0,10);
    if(d2<_inicioM||d2>_hojeC) return;
    var st2=(p2.status||'').toLowerCase();
    if(st2==='cancelado'||st2==='devolvido') return;
    var nm=getLoja(p2.loja_nome,p2.origem_conta);
    if(IGNORAR_LOJA.indexOf(nm)>=0) return;
    fatMesPorLoja[nm]=(fatMesPorLoja[nm]||0)+parseFloat(p2.valor_bruto||0);
  });

  var cardId=0;
  var html=nomes.map(function(n){
    var c=cur[n], p=prev[n]||{fat:0,ped:0};
    var tm=c.ped>0?c.fat/c.ped:0;
    var pct=fatTotal>0?c.fat/fatTotal*100:0;
    var dlt=p.fat?((c.fat-p.fat)/p.fat*100):null;
    var dltTxt=dlt===null?'—':((dlt>=0?'+':'')+dlt.toFixed(1)+'%');
    var pa=paLoja[n];
    var proj=projMes[n]||0;
    var meta=STATE.metas[n]||0;
    var cor=getCor(n);
    var cid='cc-spark-'+(cardId++);
    var fatMesLoja=fatMesPorLoja[n]||0;

    // Meta progress
    var metaHtml='';
    if(meta>0){
      var pctMeta=fatMesLoja/meta*100;
      var barW=pctMeta>100?100:pctMeta;
      var barC=pctMeta>=100?'var(--green)':(pctMeta>=70?'var(--amber)':'var(--red)');
      metaHtml='<div class="cc-meta">'+
        '<div class="cc-meta-lbl"><span>Meta: '+fmt(meta)+'</span><span style="color:'+barC+';font-weight:800;">'+pctMeta.toFixed(0)+'%</span></div>'+
        '<div class="cc-meta-bar"><div class="cc-meta-fill" style="width:'+barW+'%;background:'+barC+';"></div></div>'+
      '</div>';
    }

    // Cor da previsão baseada em atingimento projetado da meta
    var projPctMeta=meta>0?proj/meta*100:0;
    var projCor=meta>0?(projPctMeta>=100?'var(--green)':(projPctMeta>=70?'var(--amber)':'var(--red)')):'var(--amber)';
    // % atingimento atual da meta (pra mostrar ao lado da receita)
    var pctMetaAtual=meta>0?(fatMesLoja!==undefined?fatMesLoja:0)/meta*100:0;
    var pctMetaCor=meta>0?(pctMetaAtual>=100?'var(--green)':(pctMetaAtual>=70?'var(--amber)':'var(--red)')):'';

    var isHL=STATE.lojaHighlight===n;
    return '<div class="canal-card'+(isHL?' cc-highlight':'')+'" style="--canal-cor:'+cor+'" onclick="highlightLoja(\''+n.replace(/'/g,"\\'")+'\')">'+
      '<div class="cc-head"><span class="cc-dot"></span><span class="cc-name">'+lojaDisplay(n)+'</span></div>'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;">'+
        '<div><div class="cc-receita">'+fmt(c.fat)+(meta>0?'<span style="font-size:12px;font-weight:700;color:'+pctMetaCor+';margin-left:8px;">'+pctMetaAtual.toFixed(0)+'%</span>':'')+'</div>'+
        '<div class="cc-delta-row"><span class="delta-badge '+(dlt>=0.5?'up':(dlt<=-0.5?'down':'flat'))+'">'+dltTxt+'</span><span>vs anterior</span></div></div>'+
        (proj>0?'<div style="text-align:right;"><div style="font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;">Previsão mês</div><div style="font-size:1.15rem;font-weight:800;color:'+projCor+';font-variant-numeric:tabular-nums;">'+fmt(proj)+'</div>'+(meta>0?'<div style="font-size:10px;font-weight:700;color:'+projCor+';">'+projPctMeta.toFixed(0)+'% da meta</div>':'')+'</div>':'')+
      '</div>'+
      '<div class="cc-bar-wrap"><div class="cc-bar-fill" style="width:'+pct.toFixed(1)+'%"></div></div>'+
      '<div class="cc-bar-lbl">'+Math.round(pct)+'% do fat total das lojas</div>'+
      '<div class="cc-stats">'+
        '<div class="cc-stat"><div class="cc-stat-lbl">Pedidos</div><div class="cc-stat-val">'+fmtN(c.ped)+'</div></div>'+
        '<div class="cc-stat"><div class="cc-stat-lbl">Ticket</div><div class="cc-stat-val">'+fmt(tm)+'</div></div>'+
        '<div class="cc-stat"><div class="cc-stat-lbl">'+(pa!==undefined?'PA':'—')+'</div><div class="cc-stat-val">'+(pa!==undefined?fmtD(pa):'—')+'</div></div>'+
      '</div>'+
      metaHtml+
      '<div class="cc-spark-wrap"><canvas id="'+cid+'"></canvas></div>'+
    '</div>';
  }).join('');
  document.getElementById('loja-cards').innerHTML=html||'<div style="padding:30px;text-align:center;color:var(--txt3);">Sem dados no período.</div>';

  // Destroy old sparklines
  CHARTS.lojaSparklines.forEach(function(c){if(c) c.destroy();});
  CHARTS.lojaSparklines=[];
  // Render sparklines
  var sparkOpts2={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}};
  nomes.forEach(function(n,i){
    var canvas=document.getElementById('cc-spark-'+i);
    if(!canvas||!sparkData[n]) return;
    var dias=Object.keys(sparkData[n]).sort();
    var vals=dias.map(function(d){return sparkData[n][d]||0;});
    if(vals.length<2) return;
    var cor=getCor(n);
    var ch=new Chart(canvas,{type:'line',data:{labels:dias,datasets:[{data:vals,borderColor:cor,backgroundColor:cor+'22',fill:true,tension:0.4,pointRadius:0,borderWidth:1.5}]},options:sparkOpts2});
    CHARTS.lojaSparklines.push(ch);
  });
}

function agruparSkus(){
  var map={};
  STATE.itens.forEach(function(it){
    var k=it._sku_pai;
    if(!map[k]) map[k]={sku_pai:k,nome:it._nome,cat:it._cat,receita:0,qtd:0,porLoja:{},porTam:{}};
    map[k].receita+=it._receita;
    map[k].qtd+=it._qtd;
    if(!map[k].porLoja[it._loja]) map[k].porLoja[it._loja]={receita:0,qtd:0,pedidos:{}};
    map[k].porLoja[it._loja].receita+=it._receita;
    map[k].porLoja[it._loja].qtd+=it._qtd;
    map[k].porLoja[it._loja].pedidos[it.pedido_id]=true;
    var tk=it._tam||'—';
    if(!map[k].porTam[tk]) map[k].porTam[tk]={};
    map[k].porTam[tk][it._loja]=(map[k].porTam[tk][it._loja]||0)+it._qtd;
  });
  STATE.skuGroups=Object.values(map).sort(function(a,b){return b.receita-a.receita;});

var paretoLabelsPlugin={
  id:'paretoLabels',
  afterDatasetsDraw:function(chart){
    if(!chart.canvas.id||chart.canvas.id!=='chart-pareto') return;
    var barDs=chart.data.datasets[0];
    if(!barDs||barDs.type!=='bar') return;
    var meta=chart.getDatasetMeta(0);
    var ctx=chart.ctx;
    var tot=barDs.data.reduce(function(s,v){return s+(v||0);},0);
    if(tot<=0) return;
    ctx.save();
    ctx.font='700 10px Inter,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='bottom';
    ctx.fillStyle='#d4d4d8';
    meta.data.forEach(function(bar,i){
      var v=barDs.data[i]||0;
      var pct=tot>0?(v/tot*100):0;
      ctx.fillText(pct.toFixed(1)+'%',bar.x,bar.y-4);
    });
    // Linha horizontal de 80% no eixo y1 (cumulativo)
    var y1=chart.scales.y1;
    if(y1){
      var y80=y1.getPixelForValue(80);
      ctx.strokeStyle='rgba(239,68,68,0.5)';
      ctx.lineWidth=1.5;
      ctx.setLineDash([6,4]);
      ctx.beginPath();
      ctx.moveTo(chart.chartArea.left,y80);
      ctx.lineTo(chart.chartArea.right,y80);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#ef4444';
      ctx.font='700 9px Inter,sans-serif';
      ctx.textAlign='left';
      ctx.textBaseline='bottom';
      ctx.fillText('80%',chart.chartArea.left+4,y80-3);
    }
    ctx.restore();
  }
};

// Reagrupa SKUs a partir de uma lista de itens (usa STATE.itens por default)
function gruparSkusFromItens(itens){
  var map={};

    var k=it._sku_pai;
    if(!map[k]) map[k]={sku_pai:k,nome:it._nome,cat:it._cat,receita:0,qtd:0,porLoja:{},porTam:{}};
    map[k].receita+=it._receita;
    map[k].qtd+=it._qtd;
    if(!map[k].porLoja[it._loja]) map[k].porLoja[it._loja]={receita:0,qtd:0,pedidos:{}};
    map[k].porLoja[it._loja].receita+=it._receita;
    map[k].porLoja[it._loja].qtd+=it._qtd;
    map[k].porLoja[it._loja].pedidos[it.pedido_id]=true;
    var tk=it._tam||'—';
    if(!map[k].porTam[tk]) map[k].porTam[tk]={};
    map[k].porTam[tk][it._loja]=(map[k].porTam[tk][it._loja]||0)+it._qtd;

function renderSkuList(){
  var q=(document.getElementById('sku-search').value||'').toLowerCase();
  var f=itensFiltrados();
  var grupos=STATE.vendSel?gruparSkusFromItens(f.itens):STATE.skuGroups;

  var totLoja={};

    });
  });

  var lista=grupos.filter(function(s){
    if(STATE.catSel && (s.cat||'OUTROS')!==STATE.catSel) return false;

  var th='<tr><th>Nome</th><th class="r">Receita</th><th class="r">Qtd</th><th style="min-width:220px;">Distribuição por loja</th></tr>';

      var bar='<div style="display:flex;height:20px;border-radius:4px;overflow:hidden;background:var(--bg);">';

        var r=s.porLoja[c]?s.porLoja[c].receita:0;

  var grupos=STATE.skuGroups;
  if(STATE.vendSel){
    var f=itensFiltrados();
    grupos=gruparSkusFromItens(f.itens);
  }
  var s=grupos.find(function(x){return x.sku_pai===STATE.skuSel;});
  var wrap=document.getElementById('sku-detail');
  if(!s){wrap.innerHTML='<div class="sku-empty">Selecione um SKU pai acima.</div>';return;}
  var lojasN=Object.keys(s.porLoja).sort(function(a,b){return s.porLoja[b].receita-s.porLoja[a].receita;});
  var totalPed=lojasN.reduce(function(n,c){return n+Object.keys(s.porLoja[c].pedidos).length;},0);

  // Total por loja no escopo atual (denominador para "% do fat da loja")
  var totLoja={};
  grupos.forEach(function(g){
    Object.keys(g.porLoja).forEach(function(l){
      totLoja[l]=(totLoja[l]||0)+g.porLoja[l].receita;
    });
  });

  var corCatAtual=corCat(s.cat);
  var html='';
  html+='<div class="sku-header">';
  html+='<div style="flex:1;min-width:0;">';
  html+='<div style="font-size:1.15rem;font-weight:800;color:var(--txt1);margin-bottom:2px;">'+(s.nome||s.sku_pai)+'</div>';
  html+='<div style="font-size:11px;color:var(--txt3);font-weight:600;">'+s.sku_pai+'</div>';
  html+='</div>';
  html+='<div class="sku-stats">';
  html+='<div style="text-align:center;"><div style="font-weight:700;text-transform:uppercase;font-size:9px;margin-bottom:3px;">Receita</div><div style="font-size:14px;font-weight:800;color:var(--txt1);">'+fmt(s.receita)+'</div></div>';
  html+='<div style="text-align:center;"><div style="font-weight:700;text-transform:uppercase;font-size:9px;margin-bottom:3px;">Unidades</div><div style="font-size:14px;font-weight:800;color:var(--txt1);">'+fmtN(s.qtd)+'</div></div>';
  html+='<div style="text-align:center;"><div style="font-weight:700;text-transform:uppercase;font-size:9px;margin-bottom:3px;">Lojas que venderam</div><div style="font-size:14px;font-weight:800;color:var(--txt1);">'+lojasN.length+'</div></div>';
  html+='</div>';
  html+='</div>';

  // Barra 100% stacked — share do produto entre lojas
  html+='<div class="small-wrap" style="margin-bottom:12px;">';
  html+='<div class="small-title">Quanto cada loja vendeu deste produto</div>';
  html+='<div style="display:flex;height:26px;border-radius:6px;overflow:hidden;margin-top:8px;background:var(--bg);">';
  lojasN.forEach(function(c){
    var pct=s.receita>0?s.porLoja[c].receita/s.receita*100:0;
    var cor=getCor(c);
    if(pct>=3) {
      html+='<div style="width:'+pct+'%;background:'+cor+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,0.5);" title="'+c+': '+pct.toFixed(1)+'%">'+Math.round(pct)+'%</div>';
    } else {
      html+='<div style="width:'+pct+'%;background:'+cor+';" title="'+c+': '+pct.toFixed(1)+'%"></div>';
    }
  });
  html+='</div>';
  // Legenda da barra
  html+='<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-size:10px;">';
  lojasN.forEach(function(c){
    html+='<span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;border-radius:50%;background:'+getCor(c)+';"></span>'+lojaDisplay(c)+'</span>';
  });
  html+='</div></div>';

  // Cards por loja — visualização comparativa do mix

  // Tabela comparativa compacta: uma linha por loja
  html+='<div style="margin-top:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;">';
  html+='<table class="tb sku-comp-tb" style="min-width:380px;"><thead><tr><th style="text-align:left;">Loja</th><th class="r">Faturamento</th><th class="r">Qtd</th><th class="r">% das vendas da loja</th></tr></thead><tbody>';
  lojasN.forEach(function(c){
    var d=s.porLoja[c];
    var pesoLoja=totLoja[c]>0?d.receita/totLoja[c]*100:0;
    var cor=getCor(c);
    html+='<tr>';
    html+='<td style="font-weight:700;color:'+cor+';text-align:left;white-space:nowrap;"><span class="dot" style="background:'+cor+';color:'+cor+';"></span>'+lojaDisplay(c)+'</td>';
    html+='<td class="val">'+fmt(d.receita)+'</td>';
    html+='<td class="val">'+fmtN(d.qtd)+'</td>';
    html+='<td class="val" style="width:160px;"><div style="display:flex;align-items:center;gap:8px;justify-content:flex-end;"><div style="flex:1;max-width:100px;background:var(--bg);height:8px;border-radius:4px;overflow:hidden;"><div style="height:100%;width:'+(pesoLoja>100?100:pesoLoja)+'%;background:'+cor+';border-radius:4px;"></div></div><span>'+pesoLoja.toFixed(1)+'%</span></div></td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  html+='</div>';

  wrap.innerHTML=html;
}

// ---- Vendedores ----
function renderVendedores(){
  var pedToVend={};
  STATE.pedidos.forEach(function(p){if(!p._canc) pedToVend[p.id]=p._vend;});

  // Quando skuSel está ativo, só consideramos vendas do SKU selecionado (dos itens).
  // O fat/ped do vendedor vem dos itens filtrados do SKU, não dos pedidos inteiros.
  var agg={}, paVend={};

  if(STATE.skuSel){
    // Monta agregação baseada em itens do SKU
    var qtdV={}, pedV={}, pedSeen={};
    STATE.itens.forEach(function(it){
      if(it._sku_pai!==STATE.skuSel) return;
      var v=pedToVend[it.pedido_id];
      if(!v) return;
      if(!agg[v]) agg[v]={nome:v,fat:0,ped:0,lojas:{}};
      agg[v].fat+=it._receita;
      agg[v].lojas[it._loja]=(agg[v].lojas[it._loja]||0)+it._receita;
      qtdV[v]=(qtdV[v]||0)+it._qtd;
      var k=v+'|'+it.pedido_id;
      if(!pedSeen[k]){pedSeen[k]=true;agg[v].ped++;pedV[v]=(pedV[v]||0)+1;}
    });
    Object.keys(qtdV).forEach(function(v){paVend[v]=pedV[v]>0?qtdV[v]/pedV[v]:null;});
  } else {
    // Vendas completas do período (pedidos)
    STATE.pedidos.forEach(function(p){
      if(p._canc) return;
      var v=p._vend;
      if(!agg[v]) agg[v]={nome:v,fat:0,ped:0,lojas:{}};
      agg[v].fat+=parseFloat(p.valor_bruto||0);
      agg[v].ped++;
      agg[v].lojas[p._nome]=(agg[v].lojas[p._nome]||0)+parseFloat(p.valor_bruto||0);
    });
    // PA por vendedor (a partir dos itens do range 60d)
    var qtdV={}, pedV={}, pedSeen={};
    STATE.itens.forEach(function(it){
      var v=pedToVend[it.pedido_id];
      if(!v) return;
      qtdV[v]=(qtdV[v]||0)+it._qtd;
      var k=v+'|'+it.pedido_id;
      if(!pedSeen[k]){pedSeen[k]=true;pedV[v]=(pedV[v]||0)+1;}
    });
    Object.keys(qtdV).forEach(function(v){paVend[v]=pedV[v]>0?qtdV[v]/pedV[v]:null;});
  }

  Object.values(agg).forEach(function(v){
    var mx=0,top='—';
    Object.keys(v.lojas).forEach(function(l){if(v.lojas[l]>mx){mx=v.lojas[l];top=l;}});
    v.lojaTop=top; delete v.lojas;
  });
  var arr=Object.values(agg).sort(function(a,b){return b.fat-a.fat;}).slice(0,50);

  // Breadcrumb
  var breadcrumb='';
  if(STATE.skuSel){
    var sku=STATE.skuGroups.find(function(s){return s.sku_pai===STATE.skuSel;});
    var nome=sku?(sku.nome||sku.sku_pai):STATE.skuSel;
    breadcrumb='<div style="padding:8px 12px;margin-bottom:10px;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.3);border-radius:8px;font-size:11px;color:#d4d4d8;">Filtrado: vendedores que venderam <b style="color:var(--green)">'+nome+'</b> <button onclick="selectSku(\''+STATE.skuSel.replace(/'/g,"\\'")+'\')" style="margin-left:8px;background:transparent;border:1px solid rgba(34,197,94,0.4);color:var(--green);padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px;">✕ limpar</button></div>';
  }

  var html=arr.map(function(v,i){
    var tm=v.ped>0?v.fat/v.ped:0;
    var pa=paVend[v.nome];
    var isActive=STATE.vendSel===v.nome;
    var activeStyle=isActive?'background:rgba(34,197,94,0.15);':'';
    return '<tr style="cursor:pointer;'+activeStyle+'" onclick="selectVend(\''+v.nome.replace(/'/g,"\\'")+'\')"><td class="r">'+(i+1)+'</td><td style="font-weight:600">'+v.nome+'</td><td style="color:'+getCor(v.lojaTop)+'">'+lojaDisplay(v.lojaTop)+'</td><td class="val">'+fmt(v.fat)+'</td><td class="val">'+fmtN(v.ped)+'</td><td class="val">'+fmt(tm)+'</td><td class="val">'+(pa!=null?fmtD(pa):'—')+'</td></tr>';
  }).join('');
  var wrap=document.getElementById('tbody-vendedores').parentElement.parentElement.parentElement; // .tb-wrap-scroll
  // inject breadcrumb above the table
  document.getElementById('vend-breadcrumb-slot').innerHTML=breadcrumb;
  document.getElementById('tbody-vendedores').innerHTML=html||'<tr><td colspan="7" style="text-align:center;color:#d4d4d8;padding:20px;">Sem vendedores no escopo.</td></tr>';
}
