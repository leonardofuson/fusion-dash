<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fusion — Vendas E-commerce</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0a0a0b;--bg2:#18181b;--bg3:#27272a;--bdr:#27272a;--txt1:#ffffff;--txt2:#a1a1aa;--txt3:#52525b;--blue:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--txt1);min-height:100vh;}
.topbar{background:rgba(18,18,20,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);height:64px;padding:0 1.5rem;display:flex;align-items:center;padding:0 1.5rem;gap:16px;position:sticky;top:0;z-index:100;}
.topbar img{height:32px;object-fit:contain;}
.topbar-div{width:1px;height:18px;background:var(--bdr);}
.topbar-label{font-size:15px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt1);}
.nav{display:flex;gap:4px;margin-left:auto;}
.nav a{font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;text-decoration:none;color:var(--txt2);transition:all 0.15s;}
.nav a:hover{background:var(--bg3);color:var(--txt1);}
.nav a.ativo{background:var(--blue);color:#fff;}
.main{max-width:1400px;margin:0 auto;padding:1.5rem;}
.filtros{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center;}
.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--bg2);color:var(--txt2);cursor:pointer;transition:all 0.15s;}
.chip:hover{border-color:var(--blue);color:var(--blue);}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.drange{display:flex;gap:8px;align-items:center;}
.dinput{background:var(--bg2);border:1px solid var(--bdr);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--txt1);font-family:inherit;outline:none;}
.btnf{background:var(--blue);border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;}
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:1.5rem;}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:16px;transition:transform 0.2s;}
.kpi:hover{transform:translateY(-2px);}
.kpi-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--txt2);margin-bottom:8px;}
.kpi-val{font-size:1.6rem;font-weight:700;color:var(--txt1);line-height:1;}
.kpi-sub{font-size:11px;color:var(--txt3);margin-top:5px;}
.kv-blue{color:var(--blue)!important;}
.kv-green{color:var(--green)!important;}
.kv-red{color:var(--red)!important;}
.kv-amber{color:var(--amber)!important;}
.canais-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.canal-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:16px;border-left:3px solid;}
.canal-nome{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.canal-fat{font-size:1.3rem;font-weight:700;margin-bottom:4px;}
.canal-info{display:flex;gap:12px;font-size:11px;color:var(--txt2);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:20px;}
.card-title{font-size:13px;font-weight:600;color:var(--txt1);margin-bottom:16px;}
.chart-wrap{position:relative;height:220px;}
table.tb{width:100%;border-collapse:collapse;font-size:12px;}
table.tb th{background:rgba(255,255,255,0.03);color:var(--txt2);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;padding:8px 12px;border-bottom:1px solid var(--bdr);text-align:left;}
table.tb th.r{text-align:right;}
table.tb td{padding:9px 12px;border-bottom:1px solid var(--bdr);color:var(--txt1);}
table.tb td.r{text-align:right;color:var(--txt2);}
table.tb td.val{text-align:right;font-weight:600;}
table.tb tr:last-child td{border-bottom:none;}
table.tb tr:hover td{background:rgba(255,255,255,0.02);}
.bar-row{margin-bottom:10px;}
.bar-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
.bar-track{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width 0.6s;}
.spin{width:24px;height:24px;border:2px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.grid2,.canais-grid{grid-template-columns:1fr;}}

.btn-back, .btn-logout-tb{
  background:transparent;border:1px solid var(--bdr);color:var(--txt2);
  padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;
  font-family:inherit;text-decoration:none;display:inline-block;
}
.btn-back:hover{border-color:var(--blue);color:var(--blue);}
.btn-logout-tb:hover{border-color:var(--red);color:var(--red);}
#user-info-tb{font-size:13px;color:var(--txt2);}
.topbar-actions{display:flex;align-items:center;gap:14px;margin-left:auto;}
@media(max-width:768px){
  .btn-back, .btn-logout-tb{padding:5px 10px;font-size:11px;}
  #user-info-tb{display:none;}
  .topbar-actions{gap:8px;}
  .nav{display:none;}
}
@media(max-width:768px){.topbar{height:56px!important;padding:0 1rem!important;}.topbar img{height:26px!important;}.topbar-label{font-size:12px!important;}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
</head>
<body>

<header class="topbar">
  <img src="/logo-urso.png" alt="Fusion">
  <div class="topbar-div"></div>
  <span class="topbar-label">Vendas</span>
  <div class="topbar-actions"><span id="user-info-tb"></span><a href="/index.html" class="btn-back">Menu</a><button class="btn-logout-tb" onclick="fusionAuth.signOut()">Sair</button></div>
</header>

<div class="main">
  <div class="filtros">
    <div class="chips">
      <button class="chip" onclick="setPeriodo(1,this)">Hoje</button>
      <button class="chip" onclick="setPeriodo(2,this)">Ontem</button>
      <button class="chip" onclick="setPeriodo(7,this)">7 dias</button>
      <button class="chip on" onclick="setPeriodo(30,this)">30 dias</button>
      <button class="chip" onclick="setPeriodo(365,this)">12 meses</button>
    </div>
    <div class="drange">
      <input type="date" id="dt-de" class="dinput">
      <span style="color:var(--txt3);font-size:12px;">até</span>
      <input type="date" id="dt-ate" class="dinput">
      <button class="btnf" onclick="aplicarFiltro()">Filtrar</button>
    </div>
    <span id="upd" style="margin-left:auto;font-size:11px;color:var(--txt3);"></span>
  </div>

  <div class="kpi-grid" id="kpis">
    <div class="kpi"><div class="kpi-lbl">Carregando...</div><div class="spin"></div></div>
  </div>
  <div class="canais-grid" id="canais-cards"></div>

  <div class="grid2">
    <div class="card"><div class="card-title">Faturamento diário</div><div class="chart-wrap"><canvas id="chart-fat"></canvas></div></div>
    <div class="card"><div class="card-title">Faturamento por canal</div><div id="canal-bars"></div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-title">Pedidos por dia</div><div class="chart-wrap"><canvas id="chart-ped"></canvas></div></div>
    <div class="card"><div class="card-title">Ticket médio por canal</div><div id="ticket-bars"></div></div>
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div class="card-title">Detalhamento por canal</div>
    <table class="tb">
      <thead><tr>
        <th>Canal</th><th class="r">Pedidos</th><th class="r">Faturamento</th>
        <th class="r">Ticket Médio</th><th class="r">Cancelados</th><th class="r">% Total</th>
      </tr></thead>
      <tbody id="tabela-canais"></tbody>
    </table>
  </div>
</div>

<script>
var SB_URL = 'https://spulbhnmkomvgohzhfvj.supabase.co';
let AUTH_HEADERS = null; // populated after requireAuth

var CMAP = {
  // ML Fio e Trama
  'Mercado Livre Full FIO':    {n:'ML Fio',        c:'#F59E0B'},
  'Mercado Livre FIO':         {n:'ML Fio',        c:'#F59E0B'},
  // ML Confecções
  'Mercado Livre Full Confec': {n:'ML Confecções', c:'#F97316'},
  'Mercado Livre Confeções':   {n:'ML Confecções', c:'#F97316'},
  'Mercado Livre Confecções':  {n:'ML Confecções', c:'#F97316'},
  'ML Full Confecções':        {n:'ML Confecções', c:'#F97316'},
  'Mercado Livre (conta 3)':   {n:'ML Confecções', c:'#F97316'},
  // Shopee
  'Shopee FIO':                {n:'Shopee',        c:'#EF4444'},
  'Shopee Fio':                {n:'Shopee',        c:'#EF4444'},
  'Shopee Confecções':         {n:'Shopee',        c:'#EF4444'},
  'Shopee':                    {n:'Shopee',        c:'#EF4444'},
  // TikTok
  'tiktok':                    {n:'TikTok Shop',   c:'#EC4899'},
  'TikTok':                    {n:'TikTok Shop',   c:'#EC4899'},
  'TikTok Shop':               {n:'TikTok Shop',   c:'#EC4899'},
  'shopify':                   {n:'TikTok Shop',   c:'#EC4899'},
  // Site Próprio
  'Online Store':              {n:'Site Próprio',  c:'#3B82F6'},
  'web':                       {n:'Site Próprio',  c:'#3B82F6'},
  'Site Próprio':              {n:'Site Próprio',  c:'#3B82F6'},
  // Shein
  'Shein Confecções':          {n:'Shein',         c:'#8B5CF6'},
  'Shein ConfecÃ§Ãµes':       {n:'Shein',         c:'#8B5CF6'}
};

function getNome(raw, orig) {
  var r = (raw || '').trim();
  if (r && CMAP[r]) return CMAP[r].n;
  if (!r || r === '') {
    if (orig === 'shopify') return 'Site Próprio';
    if (orig === 'confeccoes') return 'ML Confecções';
    if (orig === 'fio_e_trama') return 'ML Fio';
    return 'Outros';
  }
  return r;
}
function getCor(raw, orig) {
  var r = (raw || '').trim();
  if (r && CMAP[r]) return CMAP[r].c;
  if (!r || r === '') {
    if (orig === 'shopify') return '#3B82F6';
    if (orig === 'confeccoes') return '#F97316';
    return '#F59E0B';
  }
  return '#6B7280';
}

async function buscarTudo(tabela, filtro) {
  var todos = [], offset = 0, tam = 1000;
  while (true) {
    var url = SB_URL + '/rest/v1/' + tabela + '?' + filtro + '&limit=' + tam + '&offset=' + offset;
    var r = await fetch(url, {headers: AUTH_HEADERS});
    var lote = await r.json();
    if (!Array.isArray(lote) || lote.length === 0) break;
    todos = todos.concat(lote);
    if (lote.length < tam) break;
    offset += tam;
  }
  return todos;
}

function fmt(n)  { return 'R$ ' + Math.round(n || 0).toLocaleString('pt-BR'); }
function fmtN(n) { return Math.round(n || 0).toLocaleString('pt-BR'); }
function fmtP(n) { return (n || 0).toFixed(1) + '%'; }

var chartFat = null, chartPed = null;
var DE = null, ATE = null;

function setPeriodo(dias, el) {
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('on'); });
  el.classList.add('on');
  var ate = new Date(), de = new Date();
  de.setDate(de.getDate() - dias);
  DE  = de.toISOString().split('T')[0];
  ATE = ate.toISOString().split('T')[0];
  document.getElementById('dt-de').value  = DE;
  document.getElementById('dt-ate').value = ATE;
  carregar();
}

function aplicarFiltro() {
  DE  = document.getElementById('dt-de').value;
  ATE = document.getElementById('dt-ate').value;
  document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('on'); });
  carregar();
}

async function carregar() {
  if (!DE || !ATE) return;
  document.getElementById('kpis').innerHTML = '<div class="kpi"><div class="kpi-lbl">Carregando...</div><div class="spin"></div></div>';
  document.getElementById('canais-cards').innerHTML = '';

  var filtro = 'select=data_pedido,valor_bruto,canal_nome_raw,origem_conta,status' +
    '&data_pedido=gte.' + DE +
    '&data_pedido=lte.' + ATE +
    '&origem_conta=in.(fio_e_trama,confeccoes,shopify)';

  try {
    var res = await Promise.all([
      buscarTudo('pedidos', filtro),
      buscarTudo('pedidos_historico', filtro)
    ]);

    var todos = res[0].concat(res[1]);
    var CANC = ['cancelado', 'devolvido'];
    var ativos    = todos.filter(function(p) { return CANC.indexOf((p.status || '').toLowerCase()) < 0; });
    var cancelados = todos.filter(function(p) { return CANC.indexOf((p.status || '').toLowerCase()) >= 0; });

    var porCanal = {};
    ativos.forEach(function(p) {
      var nome = getNome(p.canal_nome_raw, p.origem_conta);
      var cor  = getCor(p.canal_nome_raw, p.origem_conta);
      if (!porCanal[nome]) porCanal[nome] = {nome: nome, cor: cor, fat: 0, ped: 0, canc: 0};
      porCanal[nome].fat += parseFloat(p.valor_bruto || 0);
      porCanal[nome].ped++;
    });
    cancelados.forEach(function(p) {
      var nome = getNome(p.canal_nome_raw, p.origem_conta);
      if (!porCanal[nome]) porCanal[nome] = {nome: nome, cor: getCor(p.canal_nome_raw, p.origem_conta), fat: 0, ped: 0, canc: 0};
      porCanal[nome].canc++;
    });

    var canais   = Object.values(porCanal).sort(function(a, b) { return b.fat - a.fat; });
    var fatTotal = canais.reduce(function(s, c) { return s + c.fat; }, 0);
    var pedTotal = canais.reduce(function(s, c) { return s + c.ped; }, 0);
    var cancTotal = cancelados.length;
    var tm = pedTotal > 0 ? fatTotal / pedTotal : 0;

    document.getElementById('kpis').innerHTML =
      '<div class="kpi"><div class="kpi-lbl">Faturamento</div><div class="kpi-val">' + fmt(fatTotal) + '</div><div class="kpi-sub">' + fmtN(pedTotal) + ' pedidos</div></div>' +
      '<div class="kpi"><div class="kpi-lbl">Ticket Médio</div><div class="kpi-val kv-blue">' + fmt(tm) + '</div><div class="kpi-sub">por pedido</div></div>' +
      '<div class="kpi"><div class="kpi-lbl">Pedidos Ativos</div><div class="kpi-val kv-green">' + fmtN(pedTotal) + '</div><div class="kpi-sub">no período</div></div>' +
      '<div class="kpi"><div class="kpi-lbl">Cancelados</div><div class="kpi-val ' + (cancTotal > 0 ? 'kv-red' : 'kv-green') + '">' + fmtN(cancTotal) + '</div><div class="kpi-sub">' + (pedTotal + cancTotal > 0 ? ((cancTotal / (pedTotal + cancTotal)) * 100).toFixed(1) : 0) + '% do total</div></div>' +
      '<div class="kpi"><div class="kpi-lbl">Canais Ativos</div><div class="kpi-val kv-amber">' + canais.length + '</div><div class="kpi-sub">plataformas</div></div>';

    document.getElementById('canais-cards').innerHTML = canais.map(function(canal) {
      return '<div class="canal-card" style="border-left-color:' + canal.cor + '">' +
        '<div class="canal-nome" style="color:' + canal.cor + '">' + canal.nome + '</div>' +
        '<div class="canal-fat" style="color:' + canal.cor + '">' + fmt(canal.fat) + '</div>' +
        '<div class="canal-info"><span>' + fmtN(canal.ped) + ' pedidos</span><span>TM ' + fmt(canal.ped > 0 ? canal.fat / canal.ped : 0) + '</span><span>' + fmtP(fatTotal > 0 ? canal.fat / fatTotal * 100 : 0) + '</span></div>' +
        '</div>';
    }).join('');

    var maxFat = Math.max.apply(null, canais.map(function(c) { return c.fat; }).concat([1]));
    document.getElementById('canal-bars').innerHTML = canais.map(function(canal) {
      return '<div class="bar-row"><div class="bar-lbl"><span style="color:var(--txt1);font-weight:500">' + canal.nome + '</span><span style="color:var(--txt2)">' + fmt(canal.fat) + '</span></div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + Math.round(canal.fat / maxFat * 100) + '%;background:' + canal.cor + '"></div></div></div>';
    }).join('');

    var tms = canais.map(function(c) { return c.ped > 0 ? c.fat / c.ped : 0; });
    var maxTm = Math.max.apply(null, tms.concat([1]));
    document.getElementById('ticket-bars').innerHTML = canais.map(function(canal, i) {
      var tmC = tms[i];
      return '<div class="bar-row"><div class="bar-lbl"><span style="color:var(--txt1);font-weight:500">' + canal.nome + '</span><span style="color:var(--txt2)">' + fmt(tmC) + '</span></div>' +
        '<div class="bar-track"><div class="bar-fill" style="width:' + Math.round(tmC / maxTm * 100) + '%;background:' + canal.cor + '"></div></div></div>';
    }).join('');

    document.getElementById('tabela-canais').innerHTML = canais.map(function(canal) {
      return '<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + canal.cor + ';margin-right:8px;"></span>' + canal.nome + '</td>' +
        '<td class="val">' + fmtN(canal.ped) + '</td><td class="val">' + fmt(canal.fat) + '</td>' +
        '<td class="val">' + fmt(canal.ped > 0 ? canal.fat / canal.ped : 0) + '</td>' +
        '<td class="r">' + fmtN(canal.canc) + '</td><td class="r">' + fmtP(fatTotal > 0 ? canal.fat / fatTotal * 100 : 0) + '</td></tr>';
    }).join('');

    var porDia = {};
    ativos.forEach(function(p) {
      var d = p.data_pedido;
      if (!d) return;
      if (!porDia[d]) porDia[d] = {fat: 0, ped: 0};
      porDia[d].fat += parseFloat(p.valor_bruto || 0);
      porDia[d].ped++;
    });
    var dias = Object.keys(porDia).sort();
    var labels = dias.map(function(d) {
      return new Date(d + 'T12:00:00').toLocaleDateString('pt-BR', {day: '2-digit', month: '2-digit'});
    });

    if (chartFat) chartFat.destroy();
    chartFat = new Chart(document.getElementById('chart-fat'), {
      type: 'line',
      data: {labels: labels, datasets: [{label: 'Fat.', data: dias.map(function(d) { return porDia[d].fat; }),
        borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.08)', fill: true, tension: 0.4, pointRadius: 2, borderWidth: 2}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}},
        scales: {x: {ticks: {color: '#71717a', maxTicksLimit: 8, font: {size: 10}}, grid: {color: 'rgba(255,255,255,0.04)'}},
          y: {ticks: {color: '#71717a', font: {size: 10}, callback: function(v) { return 'R$' + Math.round(v / 1000) + 'k'; }}, grid: {color: 'rgba(255,255,255,0.04)'}}}}
    });

    if (chartPed) chartPed.destroy();
    chartPed = new Chart(document.getElementById('chart-ped'), {
      type: 'bar',
      data: {labels: labels, datasets: [{label: 'Pedidos', data: dias.map(function(d) { return porDia[d].ped; }),
        backgroundColor: 'rgba(16,185,129,0.6)', borderColor: '#10b981', borderWidth: 1, borderRadius: 3}]},
      options: {responsive: true, maintainAspectRatio: false, plugins: {legend: {display: false}},
        scales: {x: {ticks: {color: '#71717a', maxTicksLimit: 8, font: {size: 10}}, grid: {color: 'rgba(255,255,255,0.04)'}},
          y: {ticks: {color: '#71717a', font: {size: 10}}, grid: {color: 'rgba(255,255,255,0.04)'}}}}
    });

    document.getElementById('upd').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR');
  } catch(err) {
    console.error(err);
    document.getElementById('kpis').innerHTML = '<div class="kpi"><div class="kpi-lbl">Erro</div><div class="kpi-val kv-red">!</div><div class="kpi-sub">' + err.message + '</div></div>';
  }
}

var hoje = new Date();
DE  = hoje.toISOString().split('T')[0];
ATE = hoje.toISOString().split('T')[0];
document.getElementById('dt-de').value  = DE;
document.getElementById('dt-ate').value = ATE;
// Marca chip "Hoje" como ativo
document.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('on'); });
var chips = document.querySelectorAll('.chip');
if (chips.length > 0) chips[0].classList.add('on');
(async () => {
  const auth = await fusionAuth.requireAuth('ecommerce');
  if (!auth) return;
  AUTH_HEADERS = auth.headers;
  const ui = document.getElementById('user-info-tb');
  if (ui) ui.textContent = (auth.role.nome || auth.role.email);
  carregar();
})();
</script>
</body>
</html>
