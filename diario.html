<!doctype html><html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Diário — Fusion BI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{--bg:#0e1013;--panel:#171a21;--panel2:#1e222b;--line:#282d38;--txt:#e9edf4;--mut:#8a94a6;--dim:#5b6474;--accent:#7c5cff;--cy:#22d3ee;--green:#34d399;--red:#f87171;--amber:#fbbf24}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;font-size:14px}
  .topbar{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(14,16,19,.96);backdrop-filter:blur(8px);z-index:10}
  .topbar b{font-weight:800;letter-spacing:.2px}.topbar .accent{color:var(--accent)}
  .topbar .data{color:var(--mut);font-size:12px;text-transform:capitalize}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px;text-decoration:none}
  .btn:hover{border-color:var(--accent)}
  main{padding:18px 20px 40px;max-width:1240px;margin:0 auto}
  a.drill{font-size:11px;color:var(--cy);text-decoration:none}a.drill:hover{text-decoration:underline}
  .fresh{font-size:11px;color:var(--dim);margin:2px 0 16px;display:flex;align-items:center;gap:6px}
  .fresh .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
  .sec-h{display:flex;align-items:center;gap:10px;margin:24px 2px 11px}
  .sec-h h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mut);margin:0}
  .sec-h .sp{flex:1}
  /* HERO */
  .hero{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:14px}@media(max-width:820px){.hero{grid-template-columns:1fr}}
  .hcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .hcard.main{background:linear-gradient(140deg,rgba(124,92,255,.16),rgba(124,92,255,.02));border-color:rgba(124,92,255,.32)}
  .hcard .lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .hcard .big{font-size:32px;font-weight:800;margin-top:4px;white-space:nowrap;line-height:1.1}
  .hcard.main .big{font-size:38px}
  .hcard .meta{color:var(--mut);font-size:12.5px;margin-top:7px;display:flex;gap:14px;flex-wrap:wrap}
  .hcard .meta b{color:var(--txt)}
  .bar{height:9px;background:var(--panel2);border-radius:6px;overflow:hidden;margin-top:10px}
  .bar>i{display:block;height:100%;border-radius:6px}
  /* strip hoje/ontem */
  .strip{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}@media(max-width:560px){.strip{grid-template-columns:1fr}}
  .scard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:14px}
  .scard .em{font-size:22px}.scard .lbl{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .scard .v{font-size:22px;font-weight:800;white-space:nowrap}.scard .x{color:var(--mut);font-size:12px}
  .tag{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:20px;background:rgba(251,191,36,.16);color:var(--amber)}
  .tag.ok{background:rgba(52,211,153,.14);color:var(--green)}
  /* grupos */
  .grupos{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}@media(max-width:900px){.grupos{grid-template-columns:repeat(2,1fr)}}
  .gcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 14px;position:relative;overflow:hidden}
  .gcard .gtop{display:flex;align-items:center;gap:7px}
  .gcard .gdot{width:9px;height:9px;border-radius:3px}
  .gcard .gname{font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
  .gcard .gval{font-size:22px;font-weight:800;margin-top:6px;white-space:nowrap}
  .gcard .grow{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-top:5px}
  .gcard .grow b{color:var(--txt)}
  .gcard .gspark{position:absolute;bottom:0;left:0;right:0;height:30px;opacity:.45;pointer-events:none}
  .up{color:var(--green)}.down{color:var(--red)}.flat{color:var(--dim)}
  /* tabela */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:6px 4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:right;padding:9px 12px;white-space:nowrap}
  th{color:var(--mut);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line)}
  th.l,td.l{text-align:left}
  tbody tr{border-bottom:1px solid rgba(40,45,56,.5)}tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,.02)}
  td .cn{display:inline-flex;align-items:center;gap:8px}td .cn i{width:8px;height:8px;border-radius:2px;display:inline-block}
  tr.grp td{background:rgba(255,255,255,.025);font-weight:700}
  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px}
  .pill.g{background:rgba(52,211,153,.14);color:var(--green)}.pill.a{background:rgba(251,191,36,.14);color:var(--amber)}.pill.r{background:rgba(248,113,113,.14);color:var(--red)}
  .chartcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  /* alertas */
  .alerts{display:flex;flex-direction:column;gap:8px}
  .alert{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--dim);border-radius:9px;padding:10px 13px;font-size:13px}
  .alert.alta{border-left-color:var(--red)}.alert.media{border-left-color:var(--amber)}.alert.baixa{border-left-color:var(--cy)}
  .alert .sev{font-size:9.5px;text-transform:uppercase;font-weight:800;letter-spacing:.5px;padding:2px 8px;border-radius:20px;background:var(--panel2)}
  .alert.alta .sev{color:var(--red)}.alert.media .sev{color:var(--amber)}.alert.baixa .sev{color:var(--cy)}
  .alert .cat{color:var(--dim);font-size:11px;margin-left:auto;text-transform:uppercase}
  .muted{color:var(--mut)}
  #loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--mut);z-index:50}
</style></head>
<body>
<div class="topbar"><b>FUSION <span class="accent">Diário</span></b><span class="data" id="data"></span>
  <span style="flex:1"></span><span class="muted" id="who" style="font-size:12px"></span>
  <a class="btn" href="/index.html">Menu</a><button class="btn" id="btnOut">Sair</button></div>
<main>
  <div class="fresh"><span class="dot"></span><span id="freshtxt">Carregando…</span></div>

  <!-- HERO -->
  <div class="hero" id="hero"></div>
  <div class="strip" id="strip"></div>

  <!-- POR GRUPO -->
  <div class="sec-h"><h2>Por canal · mês corrente</h2><span class="sp"></span><a class="drill" href="/diretoria.html">Diretoria →</a></div>
  <div class="grupos" id="grupos"></div>

  <!-- TABELA POR CANAL -->
  <div class="sec-h"><h2>Detalhe por canal · MTD</h2><span class="sp"></span><a class="drill" href="/ecommerce.html">Ecommerce →</a></div>
  <div class="card" style="overflow-x:auto"><table id="tb"><thead><tr>
    <th class="l">Canal</th><th>Receita líq</th><th>vs mês ant.</th><th>Pedidos</th><th>Ticket</th><th>Devol.</th><th>Contrib.</th><th>Margem</th>
  </tr></thead><tbody id="tbb"></tbody></table></div>

  <!-- RITMO -->
  <div class="sec-h"><h2>Ritmo diário · 60 dias</h2></div>
  <div class="chartcard"><canvas id="ritmo" height="88"></canvas></div>

  <!-- ALERTAS -->
  <div class="sec-h"><h2>Radar · alertas</h2><span class="sp"></span><a class="drill" href="/marketing.html">Marketing →</a></div>
  <div class="alerts" id="alerts"></div>
</main>
<div id="loader">Carregando…</div>
<script>
let SB='',ANON='';const CHARTS={};
const GRUPOS=['Marketplaces','Lojas','Site','Atacado'];
const GCOR={Marketplaces:'#7c5cff',Lojas:'#22d3ee',Site:'#34d399',Atacado:'#fbbf24'};
const CANORDER=['ML Fio','ML Confec','Shopee Fio','Shopee Confec','TikTok','Shein','Venda Direta'];
const rsFull=v=>'R$ '+(Math.round(v||0)).toLocaleString('pt-BR');
const rsK=v=>{v=v||0;const a=Math.abs(v);if(a>=1e6)return 'R$ '+(v/1e6).toFixed(2).replace('.',',')+'M';if(a>=1e3)return 'R$ '+(v/1e3).toFixed(0)+'k';return 'R$ '+Math.round(v);};
const ri=v=>(Math.round(v||0)).toLocaleString('pt-BR');
const pct0=v=>(v==null||isNaN(v))?'—':Math.round(v*100)+'%';
const pct1=v=>(v==null||isNaN(v))?'—':(v*100).toFixed(1)+'%';

// datas (fuso SP)
function hojeSP(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/Sao_Paulo'});}
function agoraSP(){return new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});}
function fmtD(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function somaDias(d,n){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return fmtD(dt);}
function inicioMes(d){return d.slice(0,7)+'-01';}
function mesAnteriorMesmoDia(d){const dt=new Date(d+'T12:00:00');const day=dt.getDate();const p=new Date(dt.getFullYear(),dt.getMonth()-1,1);const dim=new Date(p.getFullYear(),p.getMonth()+1,0).getDate();return{ini:fmtD(p),ate:fmtD(new Date(p.getFullYear(),p.getMonth(),Math.min(day,dim)))};}
function diasNoMes(d){return new Date(+d.slice(0,4),+d.slice(5,7),0).getDate();}

// régua idêntica ao mvw_diretoria_dia
function recBrutaRow(p){const ml=(p.origem_conta==='fio_e_trama'||p.origem_conta==='confeccoes')&&/^Mercado Livre/.test(p.canal_nome_raw||'');return (+p.valor_bruto||0)-(ml?0:(+p.frete||0));}
function devRow(p){return (+p.valor_devolucao||0)+(+p.valor_chargeback||0);}
function grupoDe(oc,canal,loja){oc=(oc||'').toLowerCase();loja=loja||'';canal=canal||'';
  if(oc==='flecha')return'Atacado';if(oc==='kwid'&&loja==='Atacado WhatsApp')return'Atacado';
  if(oc==='kwid')return'Lojas';if(oc==='shopify'||/site pr[óo]prio/i.test(canal))return'Site';return'Marketplaces';}
function canalDe(oc,canal,loja){const g=grupoDe(oc,canal,loja);
  if(g==='Lojas')return'Lojas Físicas';if(g==='Atacado')return'Atacado';if(g==='Site')return'Site';
  const c=canal||'';
  if(/Mercado Livre FIO/i.test(c))return'ML Fio';if(/Mercado Livre Conf/i.test(c))return'ML Confec';
  if(/Shopee FIO/i.test(c))return'Shopee Fio';if(/Shopee Conf/i.test(c))return'Shopee Confec';
  if(/TikTok/i.test(c))return'TikTok';if(/Shein/i.test(c))return'Shein';return c||'Outros';}

async function getHeaders(){const s=await fusionAuth.getSession();return{apikey:ANON,Authorization:'Bearer '+(s?s.access_token:'')};}
async function apiAll(table,qs,orderKey){let all=[],off=0;const h=await getHeaders();const ord=orderKey?'&order='+orderKey:'';
  while(true){const r=await fetch(SB+'/rest/v1/'+table+'?'+qs+ord+'&limit=1000&offset='+off,{headers:h});if(!r.ok)break;const l=await r.json();all=all.concat(l);if(l.length<1000)break;off+=1000;}return all;}

const S={fresh:[],mv:[],margem:[],meta:{},alertas:[]};

async function carregar(){
  const hoje=hojeSP();
  document.getElementById('data').textContent='· '+new Date(hoje+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  const freshFrom=somaDias(hoje,-2);            // últimos 3 dias frescos (vw_pedidos_full)
  const mvFrom=somaDias(hoje,-75);              // MV cobre trend 60d + mês anterior
  const mStart=inicioMes(hoje);
  const [fresh,mv,margem,metaRows,alertas]=await Promise.all([
    apiAll('vw_pedidos_full','select=data_pedido,origem_conta,canal_nome_raw,loja_nome,valor_bruto,frete,valor_devolucao,valor_chargeback,status&data_pedido=gte.'+freshFrom+'&status=neq.cancelado','id.asc'),
    apiAll('mvw_diretoria_dia','select=data_pedido,origem_conta,canal_nome_raw,loja_nome,pedidos,receita_bruta,devolucoes&data_pedido=gte.'+mvFrom,'data_pedido.asc,origem_conta.asc,canal_nome_raw.asc,loja_nome.asc'),
    apiAll('mvw_margem_canal_dia','select=data_pedido,grupo,canal,receita_liquida,comissao,afiliado,frete_seller,devolucoes,cmv,contribuicao&data_pedido=gte.'+mStart,'data_pedido.asc,grupo.asc,canal.asc,origem_conta.asc'),
    apiAll('projecao_faturamento','select=ano_mes,valor&tipo=eq.projetado&versao=eq.1','ano_mes.asc'),
    apiAll('marketing_alertas','select=data_ref,severidade,categoria,titulo,detalhe','data_ref.desc'),
  ]);
  S.fresh=fresh;S.mv=mv;S.margem=margem;S.alertas=alertas;
  const meta={};metaRows.forEach(r=>{meta[r.ano_mes]=(meta[r.ano_mes]||0)+(+r.valor||0);});S.meta=meta;
  render(hoje,freshFrom,mStart);
  document.getElementById('loader').style.display='none';
  document.getElementById('freshtxt').innerHTML='Hoje · ontem · mês em <b>tempo real</b> ('+agoraSP()+') · margem e tendência via MV (~2h) · receita líquida (bruto − devoluções)';
}

// ── agregadores ──
// fresh: por dia + por canal/grupo (net, pedidos). mv: idem pra histórico.
function aggFresh(rows){ // {porDia:{d:net}, porCanal:{canal:{net,ped,dev,rec,grupo}}, porGrupo:{g:{net,ped}}}
  const porDia={},porCanal={},porGrupo={};
  rows.forEach(p=>{const d=p.data_pedido,g=grupoDe(p.origem_conta,p.canal_nome_raw,p.loja_nome),c=canalDe(p.origem_conta,p.canal_nome_raw,p.loja_nome);
    const rb=recBrutaRow(p),dv=devRow(p),net=rb-dv;
    porDia[d]=(porDia[d]||0)+net;
    (porCanal[c]||(porCanal[c]={net:0,ped:0,dev:0,rec:0,grupo:g}));porCanal[c].net+=net;porCanal[c].ped++;porCanal[c].dev+=dv;porCanal[c].rec+=rb;
    (porGrupo[g]||(porGrupo[g]={net:0,ped:0}));porGrupo[g].net+=net;porGrupo[g].ped++;});
  return{porDia,porCanal,porGrupo};
}
function aggMV(rows){const porDia={},porCanal={},porGrupo={};
  rows.forEach(r=>{const d=r.data_pedido,g=grupoDe(r.origem_conta,r.canal_nome_raw,r.loja_nome),c=canalDe(r.origem_conta,r.canal_nome_raw,r.loja_nome);
    const net=(+r.receita_bruta||0)-(+r.devolucoes||0),ped=(+r.pedidos||0),dev=(+r.devolucoes||0);
    porDia[d]=(porDia[d]||0)+net;
    (porCanal[c]||(porCanal[c]={net:0,ped:0,dev:0,rec:0,grupo:g}));porCanal[c].net+=net;porCanal[c].ped+=ped;porCanal[c].dev+=dev;porCanal[c].rec+=(+r.receita_bruta||0);
    (porGrupo[g]||(porGrupo[g]={net:0,ped:0}));porGrupo[g].net+=net;porGrupo[g].ped+=ped;});
  return{porDia,porCanal,porGrupo};}

function render(hoje,freshFrom,mStart){
  const F=aggFresh(S.fresh);
  const ontem=somaDias(hoje,-1);
  // ── séries diárias combinadas: MV p/ d<freshFrom, fresh p/ d>=freshFrom ──
  const mvDia={};S.mv.forEach(r=>{mvDia[r.data_pedido]=(mvDia[r.data_pedido]||0)+((+r.receita_bruta||0)-(+r.devolucoes||0));});
  const netDia=d=>(d>=freshFrom)?(F.porDia[d]||0):(mvDia[d]||0);

  // ── MTD (MV até freshFrom-1 + fresh do mês) ──
  const mtdMV=S.mv.filter(r=>r.data_pedido>=mStart&&r.data_pedido<freshFrom);
  const mtdMVagg=aggMV(mtdMV);
  const freshMes=S.fresh.filter(p=>p.data_pedido>=mStart);
  const freshMesAgg=aggFresh(freshMes);
  // merge por grupo
  const mtdG={},pedG={};GRUPOS.forEach(g=>{mtdG[g]=((mtdMVagg.porGrupo[g]||{}).net||0)+((freshMesAgg.porGrupo[g]||{}).net||0);pedG[g]=((mtdMVagg.porGrupo[g]||{}).ped||0)+((freshMesAgg.porGrupo[g]||{}).ped||0);});
  // merge por canal
  const canaisSet=new Set([...Object.keys(mtdMVagg.porCanal),...Object.keys(freshMesAgg.porCanal)]);
  const mtdCanal={};canaisSet.forEach(c=>{const a=mtdMVagg.porCanal[c]||{net:0,ped:0,dev:0,rec:0,grupo:''},b=freshMesAgg.porCanal[c]||{net:0,ped:0,dev:0,rec:0,grupo:''};
    mtdCanal[c]={net:a.net+b.net,ped:a.ped+b.ped,dev:a.dev+b.dev,rec:a.rec+b.rec,grupo:a.grupo||b.grupo};});
  const mtd=Object.values(mtdG).reduce((s,v)=>s+v,0);
  const mtdPed=Object.values(pedG).reduce((s,v)=>s+v,0);

  // ── mês anterior, mesmos dias (da MV) ──
  const pm=mesAnteriorMesmoDia(hoje);
  const pmRows=S.mv.filter(r=>r.data_pedido>=pm.ini&&r.data_pedido<=pm.ate);
  const pmAgg=aggMV(pmRows);
  const mtdPrev=Object.values(pmAgg.porGrupo).reduce((s,v)=>s+v.net,0);
  const dMtd=mtdPrev?(mtd-mtdPrev)/mtdPrev:null;

  // ── meta + projeção ──
  const metaMes=S.meta[mStart]||0;
  const dim=diasNoMes(hoje),diaHoje=+hoje.slice(8,10);
  // projeção DOW-weighted (usa netDia combinado do mês)
  const byDow={};let observed=0;for(let dd=1;dd<=diaHoje;dd++){const ds=mStart.slice(0,8)+String(dd).padStart(2,'0');const dw=new Date(ds+'T12:00:00').getDay();const v=netDia(ds);(byDow[dw]||(byDow[dw]={s:0,n:0}));byDow[dw].s+=v;byDow[dw].n++;observed+=v;}
  let proj=observed;for(let dd=diaHoje+1;dd<=dim;dd++){const dw=new Date(mStart.slice(0,8)+String(dd).padStart(2,'0')+'T12:00:00').getDay();const avg=(byDow[dw]&&byDow[dw].n)?byDow[dw].s/byDow[dw].n:(diaHoje?observed/diaHoje:0);proj+=avg;}
  const atMTD=metaMes?mtd/metaMes:null, atProj=metaMes?proj/metaMes:null;
  const dHTML=d=>d==null?'<span class="flat">—</span>':`<span class="${d>=0?'up':'down'}">${d>=0?'▲':'▼'} ${Math.abs(d*100).toFixed(0)}%</span>`;

  // ── HERO ──
  const barCol=p=>p>=1?'var(--green)':p>=0.8?'var(--amber)':'var(--red)';
  document.getElementById('hero').innerHTML=`
    <div class="hcard main"><div class="lbl">Faturamento do mês (MTD)</div>
      <div class="big">${rsFull(mtd)}</div>
      <div class="meta"><span>${ri(mtdPed)} pedidos</span><span>ticket <b>${rsFull(mtdPed?mtd/mtdPed:0)}</b></span><span>vs mesmos dias de ${new Date(pm.ini+'T12:00:00').toLocaleDateString('pt-BR',{month:'short'}).replace('.','')} ${dHTML(dMtd)}</span></div></div>
    <div class="hcard"><div class="lbl">Meta do mês</div>
      <div class="big">${rsK(metaMes)}</div>
      <div class="meta"><span><b>${pct0(atMTD)}</b> atingido${metaMes>mtd?' · faltam '+rsK(metaMes-mtd):''}</span></div>
      <div class="bar"><i style="width:${Math.min(100,(atMTD||0)*100)}%;background:${barCol(atMTD||0)}"></i></div></div>
    <div class="hcard"><div class="lbl">Projeção de fechamento</div>
      <div class="big" style="color:${atProj>=1?'var(--green)':'var(--amber)'}">${rsK(proj)}</div>
      <div class="meta"><span>${atProj>=1?'<span class="up">bate a meta</span>':'<span class="down">abaixo da meta</span>'} · <b>${pct0(atProj)}</b> · ritmo atual</span></div></div>`;

  // ── STRIP hoje/ontem ──
  const vHoje=F.porDia[hoje]||0;
  const pedHojeN=S.fresh.filter(p=>p.data_pedido===hoje).length, pedOntemN=S.fresh.filter(p=>p.data_pedido===ontem).length;
  const vOntem=F.porDia[ontem]||0;
  document.getElementById('strip').innerHTML=`
    <div class="scard"><span class="em">🟡</span><div><div class="lbl">Hoje até agora <span class="tag">parcial</span></div><div class="v">${rsFull(vHoje)}</div><div class="x">${ri(pedHojeN)} pedidos · atualizando ao vivo</div></div></div>
    <div class="scard"><span class="em">✅</span><div><div class="lbl">Ontem <span class="tag ok">fechado</span></div><div class="v">${rsFull(vOntem)}</div><div class="x">${ri(pedOntemN)} pedidos · ticket ${rsFull(pedOntemN?vOntem/pedOntemN:0)}</div></div></div>`;

  // ── GRUPOS ──
  const contribG={};GRUPOS.forEach(g=>contribG[g]={net:0,c:0});
  S.margem.filter(r=>r.data_pedido>=mStart&&r.data_pedido<=hoje).forEach(r=>{if(contribG[r.grupo]){contribG[r.grupo].net+=(+r.receita_liquida||0);contribG[r.grupo].c+=(+r.contribuicao||0);}});
  document.getElementById('grupos').innerHTML=GRUPOS.map(g=>{
    const cur=mtdG[g],prev=(pmAgg.porGrupo[g]||{}).net||0,dl=prev?(cur-prev)/prev:null;
    const cg=contribG[g],cp=cg&&cg.net?cg.c/cg.net:null;
    return `<div class="gcard"><div class="gtop"><span class="gdot" style="background:${GCOR[g]}"></span><span class="gname">${g}</span></div>
      <div class="gval">${rsK(cur)}</div>
      <div class="grow"><span>${dHTML(dl)} <span class="muted">vs mês ant.</span></span></div>
      <div class="grow"><span class="muted">${ri(pedG[g])} ped</span><span>contrib <b>${cp==null?'—':pct0(cp)}</b></span></div>
      <canvas class="gspark" id="sp-${g}"></canvas></div>`;
  }).join('');
  GRUPOS.forEach(g=>{const dias=[];for(let i=13;i>=0;i--)dias.push(somaDias(hoje,-i));
    // net por dia por grupo: usa MV p/ passado + fresh p/ recente
    const mvGDia={};S.mv.forEach(r=>{if(grupoDe(r.origem_conta,r.canal_nome_raw,r.loja_nome)===g){mvGDia[r.data_pedido]=(mvGDia[r.data_pedido]||0)+((+r.receita_bruta||0)-(+r.devolucoes||0));}});
    const frGDia={};S.fresh.forEach(p=>{if(grupoDe(p.origem_conta,p.canal_nome_raw,p.loja_nome)===g){frGDia[p.data_pedido]=(frGDia[p.data_pedido]||0)+(recBrutaRow(p)-devRow(p));}});
    const data=dias.map(d=>d>=freshFrom?(frGDia[d]||0):(mvGDia[d]||0));
    if(CHARTS['sp-'+g])CHARTS['sp-'+g].destroy();const ctx=document.getElementById('sp-'+g);if(!ctx)return;
    CHARTS['sp-'+g]=new Chart(ctx,{type:'line',data:{labels:dias,datasets:[{data,borderColor:GCOR[g],backgroundColor:GCOR[g]+'22',fill:true,tension:.35,pointRadius:0,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false,min:0}}}});});

  // ── TABELA POR CANAL ──
  renderTabela(mtdCanal,pmAgg.porCanal);

  // ── RITMO 60d ──
  const d60=[];for(let i=59;i>=0;i--)d60.push(somaDias(hoje,-i));
  const serie=d60.map(d=>netDia(d));
  const mm7=serie.map((_,i)=>{const s=serie.slice(Math.max(0,i-6),i+1);return s.reduce((a,b)=>a+b,0)/s.length;});
  const metaDia=metaMes?metaMes/dim:null;
  if(CHARTS.ritmo)CHARTS.ritmo.destroy();
  CHARTS.ritmo=new Chart(document.getElementById('ritmo'),{data:{labels:d60.map(d=>d.slice(8)+'/'+d.slice(5,7)),datasets:[
    {type:'bar',label:'Receita líq/dia',data:serie,backgroundColor:'rgba(124,92,255,.5)',borderRadius:3,order:3},
    {type:'line',label:'Média 7d',data:mm7,borderColor:'#22d3ee',pointRadius:0,borderWidth:2,tension:.35,order:1},
    ...(metaDia?[{type:'line',label:'Meta/dia',data:d60.map(()=>metaDia),borderColor:'#fbbf24',borderDash:[5,4],pointRadius:0,borderWidth:1.5,order:2}]:[])]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8a94a6',boxWidth:12,font:{size:11}}}},scales:{y:{ticks:{color:'#8a94a6',callback:v=>'R$'+Math.round(v/1000)+'k'},grid:{color:'rgba(40,45,56,.6)'}},x:{ticks:{color:'#8a94a6',maxTicksLimit:16,font:{size:10}},grid:{display:false}}}}});

  // ── ALERTAS ──
  const ref=S.alertas.length?S.alertas[0].data_ref:null;const av=S.alertas.filter(a=>a.data_ref===ref);
  const so={alta:0,media:1,baixa:2};av.sort((a,b)=>(so[a.severidade]??3)-(so[b.severidade]??3));
  document.getElementById('alerts').innerHTML=av.length?av.map(a=>`<div class="alert ${a.severidade}"><span class="sev">${a.severidade}</span><span>${a.titulo}${a.detalhe?' <span class="muted">— '+a.detalhe+'</span>':''}</span><span class="cat">${a.categoria}</span></div>`).join(''):'<div class="muted" style="padding:8px">Sem alertas ativos. 🎉</div>';
}

function renderTabela(mtdCanal,prevCanal){
  const rows=Object.entries(mtdCanal).map(([canal,o])=>({canal,...o}));
  // contribuição por canal (da margem MV, MTD) — mapeia por label
  const cbyCanal={};S.margem.forEach(r=>{const c=canalDeMargem(r.grupo,r.canal);(cbyCanal[c]||(cbyCanal[c]={net:0,c:0}));cbyCanal[c].net+=(+r.receita_liquida||0);cbyCanal[c].c+=(+r.contribuicao||0);});
  // ordena por grupo (ordem fixa) e dentro por net
  const ordGrupo={Marketplaces:0,Site:1,Lojas:2,Atacado:3};
  rows.sort((a,b)=>(ordGrupo[a.grupo]-ordGrupo[b.grupo])||(b.net-a.net));
  let h='';let curG=null;
  rows.forEach(r=>{
    if(r.grupo!==curG){curG=r.grupo;}
    const prev=prevCanal[r.canal]?prevCanal[r.canal].net:0,dl=prev?(r.net-prev)/prev:null;
    const cb=cbyCanal[r.canal],cp=cb&&cb.net?cb.c/cb.net:null;
    const devp=r.rec?r.dev/r.rec:0;
    const mpill=cp==null?'<span class="muted">—</span>':`<span class="pill ${cp>=.30?'g':cp>=.15?'a':'r'}">${pct0(cp)}</span>`;
    h+=`<tr><td class="l"><span class="cn"><i style="background:${GCOR[r.grupo]}"></i>${r.canal}</span></td>
      <td>${rsK(r.net)}</td><td>${dl==null?'<span class="flat">—</span>':`<span class="${dl>=0?'up':'down'}">${dl>=0?'▲':'▼'}${Math.abs(dl*100).toFixed(0)}%</span>`}</td>
      <td>${ri(r.ped)}</td><td>${rsFull(r.ped?r.net/r.ped:0)}</td><td>${devp>0.001?pct1(devp):'—'}</td>
      <td>${cb?rsK(cb.c):'—'}</td><td>${mpill}</td></tr>`;
  });
  document.getElementById('tbb').innerHTML=h||'<tr><td colspan="8" class="l muted" style="padding:14px">Sem dados no mês.</td></tr>';
}
// margem MV usa canal_nome_raw cru → mapeia pro mesmo label da tabela
function canalDeMargem(grupo,canalRaw){
  if(grupo==='Lojas')return'Lojas Físicas';if(grupo==='Atacado')return'Atacado';if(grupo==='Site')return'Site';
  return canalDe('',canalRaw,'');
}

(async()=>{
  const auth=await fusionAuth.requireAuth('diario');if(!auth)return;
  document.getElementById('who').textContent=(auth.role&&auth.role.nome)||auth.email||'';
  SB=fusionAuth.SUPABASE_URL;ANON=fusionAuth.SUPABASE_ANON_KEY;
  document.getElementById('btnOut').onclick=()=>fusionAuth.signOut();
  try{await carregar();}catch(e){document.getElementById('loader').textContent='Erro: '+e.message;console.error(e);}
})();
</script>
